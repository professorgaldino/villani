<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 24</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    padding:15px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.topo{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

select{
    padding:8px;
    border-radius:6px;
}

/* NAVEGAÇÃO */
.navegacao-alunos{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:20px;
}

.btn-aluno{
    width:42px;
    height:42px;
    border:none;
    border-radius:8px;
    background:#0077cc;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn-aluno.ativo{
    background:#28a745;
}

/* CARD */
.aluno{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:20px;
    display:flex;
    gap:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.foto{
    width:90px;
    height:90px;
    border-radius:10px;
    object-fit:cover;
}

.sem-foto{
    width:90px;
    height:90px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
    color:red;
    border-radius:10px;
}

.info{
    flex:1;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
    margin-top:10px;
}

th, td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th{
    background:#0077cc;
    color:white;
}

.nao-lancado{
    background:#fff3cd;
    color:#856404;
    font-size:11px;
    font-weight:bold;
}

.baixa-nota{
    color:red;
    font-weight:bold;
}

.eletiva-box{
    margin-top:6px;
    padding:8px;
    border-radius:8px;
    background:white;
    border:1px solid #ddd;
}

/* DASHBOARD */
#popupDashboard{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    z-index:9999;
    overflow:auto;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim Completo</h2>

    <select id="salaSelect">
        <option value="6a">6º Ano A</option>
        <option value="6b">6º Ano B</option>
        <option value="6c">6º Ano C</option>
        <option value="7a">7º Ano A</option>
        <option value="7b">7º Ano B</option>
        <option value="7c">7º Ano C</option>
        <option value="8a">8º Ano A</option>
        <option value="8b">8º Ano B</option>
        <option value="8c">8º Ano C</option>
    </select>
</div>

<div id="navegacaoAlunos" class="navegacao-alunos"></div>

<button onclick="abrirDashboard()" style="padding:10px 18px;border:none;border-radius:8px;background:#6f42c1;color:white;cursor:pointer;">
📊 Dashboard da Sala
</button>

<div id="popupDashboard">
    <div style="background:white;width:95%;max-width:1200px;margin:30px auto;padding:20px;border-radius:12px;position:relative;">
        <button onclick="fecharDashboard()" style="position:absolute;right:10px;top:10px;">X</button>

        <h2>Dashboard</h2>

        <select id="dashboardBimestre" onchange="gerarDashboard()">
            <option value="1">1º Bimestre</option>
            <option value="2">2º Bimestre</option>
            <option value="3">3º Bimestre</option>
            <option value="4">4º Bimestre</option>
        </select>

        <div id="dashboardConteudo"></div>
    </div>
</div>

<div id="boletim"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const BIMESTRES = {1:"1",2:"2",3:"3",4:"4"};

let serie = "6a";
let alunos = [];
let dadosBimestres = {};
let indiceAtual = 0;
let graficoDashboard = null;

function normalizar(t){
    return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

function v(x){
    return (x===null||x===undefined||x==="") ? "-" : x;
}

/* =========================
   CARREGAMENTO
========================= */

async function carregarAlunos(){
    const res = await fetch(URL_ALUNOS);
    alunos = await res.json();
}

async function carregarBimestre(n){
    try{
        const res = await fetch(`${serie}/${BIMESTRES[n]}.json`);
        if(!res.ok) return null;
        return await res.json();
    }catch{
        return null;
    }
}

async function carregar(){
    await carregarAlunos();

    for(let i=1;i<=4;i++){
        dadosBimestres[i] = await carregarBimestre(i);
    }
}

/* =========================
   INICIALIZAÇÃO CORRETA
========================= */

async function iniciar(){
    await carregar();
    montarNavegacao();

    const base = dadosBimestres[1];
    if(base && Object.keys(base).length>0){
        mostrarAluno(0);
    }
}

iniciar();

/* =========================
   NAVEGAÇÃO
========================= */

function montarNavegacao(){
    const nav = document.getElementById("navegacaoAlunos");
    nav.innerHTML="";

    const base = dadosBimestres[1];
    if(!base) return;

    Object.values(base).forEach((a,i)=>{
        nav.innerHTML += `
        <button class="btn-aluno ${i===0?'ativo':''}" onclick="mostrarAluno(${i})">${i+1}</button>
        `;
    });
}

/* =========================
   ALUNO
========================= */

function mostrarAluno(index){
    indiceAtual = index;

    const base = Object.values(dadosBimestres[1]||{});
    const a = base[index];
    if(!a) return;

    document.getElementById("boletim").innerHTML = `
        <div class="aluno">
            <div class="info">
                <strong>${a.nome}</strong><br><br>
                ${montarTabelaUnica(a.nome)}
            </div>
        </div>
    `;
}

/* =========================
   TABELA SIMPLIFICADA
========================= */

function montarTabelaUnica(nome){
    const alunoBase = Object.values(dadosBimestres[1]||{}).find(a=>a.nome===nome);
    if(!alunoBase) return "Sem dados";

    let html="<table><tr><th>Disciplina</th><th>Nota</th></tr>";

    for(let d in alunoBase.disciplinas){
        const nota = alunoBase.disciplinas[d].numero;
        html+=`<tr><td>${d}</td><td>${v(nota)}</td></tr>`;
    }

    html+="</table>";
    return html;
}

/* =========================
   DASHBOARD
========================= */

function abrirDashboard(){
    document.getElementById("popupDashboard").style.display="block";
    gerarDashboard();
}

function fecharDashboard(){
    document.getElementById("popupDashboard").style.display="none";
}

function gerarDashboard(){

    const b = document.getElementById("dashboardBimestre").value;
    const dados = dadosBimestres[b];

    if(!dados){
        document.getElementById("dashboardConteudo").innerHTML =
        "<div class='nao-lancado'>Sem dados ainda</div>";
        return;
    }

    let total=0;

    Object.values(dados).forEach(a=>{
        for(let d in a.disciplinas){
            const n = Number(a.disciplinas[d].numero);
            if(!isNaN(n) && n<5) total++;
        }
    });

    document.getElementById("dashboardConteudo").innerHTML=
    `<h3>Notas baixas: ${total}</h3>`;
}

/* =========================
   TROCAR SÉRIE
========================= */

document.getElementById("salaSelect").addEventListener("change",e=>{
    serie=e.target.value;
    iniciar();
});

</script>

</body>
</html>
