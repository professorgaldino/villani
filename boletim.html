<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Bimestral</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 80px;
    height: 80px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    border-radius: 10px;
}

/* INFO */
.header {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 10px;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

th {
    background: #0077cc;
    color: white;
}

/* 🔥 destaque roxo */
.vazio {
    background: #e8ddff;
    color: #555;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim Bimestral</h2>
</div>

<div id="boletim"></div>

</div>

<script>

// 📂 4 bimestres (JSONs)
const BIMESTRES = [
    "6apb.json", // 1º
    "7apb.json", // 2º (exemplo)
    "8apb.json", // 3º (exemplo)
    "9apb.json"  // 4º (exemplo)
];

let dadosBimestres = [];

// 📸 FOTO
function montarFoto(id) {
    if (!id) return null;
    return "https://lh3.googleusercontent.com/d/" + id;
}

// 🔢 VALOR
function v(x) {
    return (x === null || x === undefined) ? "-" : x;
}

// 📥 CARREGAR TODOS BIMESTRES
async function carregar() {

    dadosBimestres = await Promise.all(
        BIMESTRES.map(url => fetch(url).then(r => r.json()))
    );

    montar();
}

// 📊 MONTA BOLETIM BIMESTRAL
function montar() {

    const box = document.getElementById("boletim");
    box.innerHTML = "";

    const alunos = Object.values(dadosBimestres[0]); // base alunos

    alunos.forEach(alunoBase => {

        const foto = montarFoto(alunoBase.foto);

        let html = `
        <div class="aluno">

            <div class="header">
                ${foto
                    ? `<img class="foto" src="${foto}">`
                    : `<div class="sem-foto">❌</div>`
                }

                <div>
                    <strong>${alunoBase.nome}</strong><br>
                    RA: ${v(alunoBase.numero)}<br>
                    Situação: ${v(alunoBase.situacao)}
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Disciplina</th>
                        <th>1º Bim</th>
                        <th>2º Bim</th>
                        <th>3º Bim</th>
                        <th>4º Bim</th>
                    </tr>
                </thead>
                <tbody>
        `;

        const disciplinas = alunoBase.disciplinas;

        for (let nome in disciplinas) {

            html += `<tr><td>${nome}</td>`;

            dadosBimestres.forEach(bim => {

                const aluno = Object.values(bim).find(a => a.nome === alunoBase.nome);

                const d = aluno?.disciplinas?.[nome];

                const media = v(d?.numero);

                html += `
                    <td class="${media === '-' ? 'vazio' : ''}">
                        ${media}
                    </td>
                `;
            });

            html += `</tr>`;
        }

        html += `
                </tbody>
            </table>

        </div>
        `;

        box.innerHTML += html;
    });
}

carregar();

</script>

</body>
</html>
