<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 12</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    padding:15px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.topo{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

select{
    padding:8px;
    border-radius:6px;
}

/* CARD */
.aluno{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:20px;
    display:flex;
    gap:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto{
    width:90px;
    height:90px;
    border-radius:10px;
    object-fit:cover;
    border:2px solid #ddd;
}

.sem-foto{
    width:90px;
    height:90px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
    color:red;
    border-radius:10px;
}

/* INFO */
.info{
    flex:1;
    font-size:14px;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    margin-top:10px;
}

th, td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th{
    background:#0077cc;
    color:white;
}

.vazio{
    background:#e8ddff;
}

/* ELETIVAS */
.eletiva-box{
    margin-top:6px;
    padding:8px;
    border-radius:8px;
    background:white;
    border:1px solid #ddd;
}

/* BIMESTRE */
.titulo-bimestre{
    margin-top:14px;
    font-weight:bold;
    font-size:15px;
}

.nao-lancado{
    background:#fff3cd;
    color:#856404;
    padding:8px;
    border-radius:8px;
    margin-top:6px;
    border:1px solid #ffeeba;
}

</style>

</head>

<body>

<div class="container">

<div class="topo">

    <h2>📊 Boletim Completo</h2>

    <select id="salaSelect">
        <option value="6">6º Ano A</option>
        <option value="7">7º Ano A</option>
        <option value="8">8º Ano A</option>
    </select>

</div>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS =
"https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const BIMESTRES = {
    1: "apb",
    2: "asb",
    3: "atb",
    4: "aqb"
};

let serie = "6";

let alunos = [];
let dadosBimestres = {};

// FOTO
function montarFoto(id){
    if(!id) return null;

    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

// NORMALIZAR
function normalizar(t){
    return (t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// VALOR
function v(x){
    return (x === null || x === undefined || x === "")
        ? "-"
        : x;
}

// CARREGAR ALUNOS
async function carregarAlunos(){

    const res = await fetch(URL_ALUNOS);
    alunos = await res.json();
}

// CARREGAR BIMESTRE
async function carregarBimestre(n){

    try{

        const arquivo = `${serie}${BIMESTRES[n]}.json`;

        const res = await fetch(arquivo);

        if(!res.ok){
            throw new Error();
        }

        return await res.json();

    }catch(e){

        return null;
    }
}

// CARREGAR TUDO
async function carregar(){

    await carregarAlunos();

    dadosBimestres = {};

    for(let i = 1; i <= 4; i++){

        dadosBimestres[i] = await carregarBimestre(i);
    }

    montar();
}

// ELETIVAS
function montarEletivas(alunoBase){

    const e1 = alunoBase?.eletiva1 || "";
    const e2 = alunoBase?.eletiva2 || "";

    return `
    <div class="eletiva-box">

        <strong>📘 Eletivas</strong><br><br>

        Eletiva 1° Semestre:
        ${e1 ? e1 : "Sem eletiva"}<br>

        Eletiva 2° Semestre:
        ${e2 ? e2 : "Sem eletiva"}

    </div>
    `;
}

// TABELA BIMESTRE
function montarTabelaBimestre(nomeAluno, dados, titulo){

    if(!dados){

        return `
        <div class="titulo-bimestre">📘 ${titulo}</div>

        <div class="nao-lancado">
            Bimestre não lançado
        </div>
        `;
    }

    const aluno = Object.values(dados)
        .find(a => normalizar(a.nome) === normalizar(nomeAluno));

    if(!aluno){

        return `
        <div class="titulo-bimestre">📘 ${titulo}</div>

        <div class="nao-lancado">
            Bimestre não lançado
        </div>
        `;
    }

    let linhas = "";

    for(let nome in aluno.disciplinas){

        const d = aluno.disciplinas[nome];

        const media = v(d.numero);
        const faltas = v(d.media);
        const acum = v(d.faltas);

        linhas += `
        <tr>
            <td>${nome}</td>

            <td class="${media==='-' ? 'vazio' : ''}">
                ${media}
            </td>

            <td class="${faltas==='-' ? 'vazio' : ''}">
                ${faltas}
            </td>

            <td>
                ${acum}
            </td>
        </tr>
        `;
    }

    return `
    <div class="titulo-bimestre">
        📘 ${titulo}
    </div>

    <table>

        <tr>
            <th>Disciplina</th>
            <th>Média</th>
            <th>Faltas</th>
            <th>Faltas AC</th>
        </tr>

        ${linhas}

    </table>

    <br>

    📌 Faltas acumuladas:
    ${v(aluno.totais?.faltas_acumuladas)}<br>

    📊 Frequência:
    ${v(aluno.totais?.frequencia)}%<br>

    📌 Faltas anual:
    ${v(aluno.totais?.faltas_anual)}<br>

    📊 Frequência anual:
    ${v(aluno.totais?.frequencia_anual)}%
    `;
}

// MONTAR
function montar(){

    const box = document.getElementById("boletim");

    box.innerHTML = "";

    const mapaAlunos = {};

    alunos.forEach(a => {

        mapaAlunos[normalizar(a.nome)] = a;
    });

    // BASE = 1º BIMESTRE
    const base = dadosBimestres[1];

    if(!base){

        box.innerHTML = `
        <div class="nao-lancado">
            Nenhum boletim encontrado.
        </div>
        `;

        return;
    }

    Object.values(base).forEach(a => {

        const alunoBase = mapaAlunos[normalizar(a.nome)];

        const foto = alunoBase
            ? montarFoto(alunoBase.foto)
            : null;

        const fotoHTML = foto
            ? `<img class="foto" src="${foto}">`
            : `<div class="sem-foto">❌</div>`;

        box.innerHTML += `
        <div class="aluno">

            ${fotoHTML}

            <div class="info">

                <strong>${a.nome}</strong><br>

                RA:
                ${alunoBase?.ra || "-"}<br>

                Tutor:
                ${alunoBase?.tutor || "-"}<br>

                ${montarEletivas(alunoBase)}

                <br>

                ${montarTabelaBimestre(
                    a.nome,
                    dadosBimestres[1],
                    "1º Bimestre"
                )}

                ${montarTabelaBimestre(
                    a.nome,
                    dadosBimestres[2],
                    "2º Bimestre"
                )}

                ${montarTabelaBimestre(
                    a.nome,
                    dadosBimestres[3],
                    "3º Bimestre"
                )}

                ${montarTabelaBimestre(
                    a.nome,
                    dadosBimestres[4],
                    "4º Bimestre"
                )}

            </div>

        </div>
        `;
    });
}

// TROCA SALA
document.getElementById("salaSelect")
.addEventListener("change", e => {

    serie = e.target.value;

    carregar();
});

// INICIAR
carregar();

</script>

</body>
</html>
