<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 1</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

/* CARD ALUNO */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: red;
}

/* INFO */
.info {
    flex: 1;
    font-size: 14px;
}

/* TABELA */
.table-wrapper {
    overflow-x: auto;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
    font-size: 13px;
}

th {
    background: #0077cc;
    color: white;
}

/* MOBILE */
@media (max-width: 768px) {
    .aluno {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    table {
        min-width: 500px;
    }
}
</style>

</head>

<body>

<div class="container">
    <h2>📊 Boletim Escolar</h2>

    <div id="boletim"></div>
</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";
const URL_NOTAS = "6apb.json"; // ajuste sua sala aqui

let alunos = [];
let notas = {};

// 🔥 FOTO (MESMA ESTRATÉGIA DO OUTRO SISTEMA)
function montarFoto(id) {
    if (!id) return null;

    id = String(id).trim();

    if (id.length < 10) return null;

    return "https://lh3.googleusercontent.com/d/" + id;
}

// 📅 NORMALIZAR NOME
function normalizar(texto) {
    return (texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// 📥 CARREGAR DADOS
async function carregar() {
    try {
        const resAlunos = await fetch(URL_ALUNOS);
        alunos = await resAlunos.json();

        const resNotas = await fetch(URL_NOTAS);
        notas = await resNotas.json();

        montarBoletim();

    } catch (e) {
        console.error("❌ ERRO AO CARREGAR DADOS:", e);
    }
}

// 📊 MONTA BOLETIM
function montarBoletim() {

    const container = document.getElementById("boletim");
    container.innerHTML = "";

    const mapaNotas = {};

    for (let key in notas) {
        const aluno = notas[key];
        if (!aluno?.nome) continue;

        mapaNotas[normalizar(aluno.nome)] = aluno;
    }

    alunos.forEach(aluno => {

        const dados = mapaNotas[normalizar(aluno.nome)];
        if (!dados) return;

        const fotoFinal = montarFoto(aluno.foto);

        const fotoHTML = fotoFinal
            ? `<img class="foto" src="${fotoFinal}" onerror="erroFoto('${aluno.nome}', '${aluno.foto}')">`
            : `<div class="sem-foto">❌</div>`;

        const div = document.createElement("div");
        div.className = "aluno";

        div.innerHTML = `
            ${fotoHTML}

            <div class="info">
                <strong>${aluno.nome}</strong><br>
                RA: ${aluno.ra || '-'}<br>
                Tutor: ${aluno.tutor || '-'}

                <div class="table-wrapper">
                    ${gerarTabela(dados.disciplinas)}
                </div>
            </div>
        `;

        container.appendChild(div);
    });
}

// 📊 TABELA
function gerarTabela(disciplinas) {
    if (!disciplinas) return "<p>Sem disciplinas</p>";

    let html = `
    <table>
        <tr>
            <th>Disciplina</th>
            <th>Chamada</th>
            <th>Média</th>
            <th>Faltas</th>
            <th>Acumulado</th>
        </tr>
    `;

    for (let nome in disciplinas) {
        const d = disciplinas[nome];

        html += `
        <tr>
            <td>${nome.replaceAll("_", " ")}</td>
            <td>${d.numero ?? "-"}</td>
            <td>${d.media ?? "-"}</td>
            <td>${d.faltas ?? "-"}</td>
            <td>${d.acumulado ?? "-"}</td>
        </tr>
        `;
    }

    html += "</table>";
    return html;
}

// ❌ ERRO DE FOTO
function erroFoto(nome, id) {
    console.error("❌ ERRO FOTO:");
    console.error("Aluno:", nome);
    console.error("ID:", id);
    console.error("Possível causa: ID inválido ou sem permissão no Google Drive");
}

carregar();

</script>

</body>
</html>
