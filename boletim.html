<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Boletim Escolar 2</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .lista button {
      margin: 4px;
      padding: 8px;
      cursor: pointer;
    }

    .boletim {
      margin-top: 20px;
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 10px;
    }

    img {
      width: 120px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>📋 Boletim Geral</h2>

<div id="lista">Carregando...</div>

<div class="boletim" id="boletim">
  Clique em um aluno
</div>

<script>

// 🔗 SEUS WEB APPS
const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";
const URL_NOTAS  = "https://script.google.com/macros/s/AKfycbxV79Zwk5OlhLoHonFAkjFJMgpGi8isFm7diseGns9ey8asfJQ9FCAmRKC2QZ0nKWXQ/exec";

let dados = [];

// ==============================
// 🔧 NORMALIZAR
// ==============================

function normalizar(txt) {
  return String(txt)
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}


// ==============================
// 🔗 CRUZAR
// ==============================

function cruzar(alunos, notas) {

  let mapa = {};

  alunos.forEach(a => {
    let chave = normalizar(a.nome) + "|" + normalizar(a.sala);
    mapa[chave] = a;
  });

  let resultado = [];

  notas.forEach(n => {

    let chave = normalizar(n.nome) + "|" + normalizar(n.sala);

    if (mapa[chave]) {
      resultado.push({
        nome: n.nome,
        sala: n.sala,
        situacao: n.situacao,
        total: n.total || "",
        frequencia: n.frequencia || "",
        foto: mapa[chave].foto || ""
      });
    }

  });

  return resultado;
}


// ==============================
// 📥 CARREGAR
// ==============================

async function carregar() {

  try {

    let alunos = await fetch(URL_ALUNOS).then(r => r.json());
    let notas  = await fetch(URL_NOTAS).then(r => r.json());

    dados = cruzar(alunos, notas);

    renderLista();

  } catch (e) {
    document.getElementById("lista").innerHTML = "Erro ao carregar dados";
    console.error(e);
  }
}


// ==============================
// 🔢 LISTA
// ==============================

function renderLista() {

  let html = "";

  dados.forEach((a, i) => {
    html += `<button onclick="abrir(${i})">${i+1}</button>`;
  });

  document.getElementById("lista").innerHTML = html;
}


// ==============================
// 📄 BOLETIM
// ==============================

function abrir(i) {

  let a = dados[i];

  let foto = a.foto
    ? `https://drive.google.com/uc?id=${a.foto}`
    : "https://via.placeholder.com/120";

  let html = `
    <h3>${a.nome}</h3>
    <img src="${foto}">
    <p><b>Sala:</b> ${a.sala}</p>
    <p><b>Situação:</b> ${a.situacao}</p>
    <p><b>Total de Faltas:</b> ${a.total}</p>
    <p><b>Frequência:</b> ${a.frequencia}</p>
  `;

  document.getElementById("boletim").innerHTML = html;
}


// 🚀 INICIAR
carregar();

</script>

</body>
</html>
