<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Boletim Escolar</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f4f4f4;
    }

    h1 {
      text-align: center;
    }

    #container {
      display: flex;
      gap: 20px;
    }

    #lista {
      width: 40%;
      background: white;
      padding: 10px;
      border-radius: 8px;
      height: 500px;
      overflow-y: auto;
    }

    #lista li {
      padding: 8px;
      cursor: pointer;
      border-bottom: 1px solid #ddd;
    }

    #lista li:hover {
      background: #eee;
    }

    #notas {
      width: 60%;
      background: white;
      padding: 20px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>📋 Boletim Geral</h1>

<div id="container">
  <ul id="lista"></ul>

  <div id="notas">
    Clique em um aluno
  </div>
</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";
const URL_NOTAS = "https://script.google.com/macros/s/AKfycbx6ijQUGAagM-Jvfj07eD4I1eIquYvMeGCZhm26qp9KRAEWaYIYJeqvrZA3cHJcpmBT/exec";

let alunos = [];
let notas = [];

async function carregarDados() {
  try {
    const resAlunos = await fetch(URL_ALUNOS);
    alunos = await resAlunos.json();

    const resNotas = await fetch(URL_NOTAS);
    notas = await resNotas.json();

    listarAlunos();
  } catch (e) {
    document.getElementById("lista").innerHTML = "❌ Erro ao carregar dados";
    console.error(e);
  }
}

function listarAlunos() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  alunos.forEach((aluno) => {
    const li = document.createElement("li");
    li.textContent = aluno.ALUNO;

    li.onclick = () => mostrarNotas(aluno);

    lista.appendChild(li);
  });
}

function normalizar(texto) {
  if (!texto) return "";

  return texto
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}

function mostrarNotas(aluno) {
  const nomeAluno = normalizar(aluno.ALUNO);

  const notaAluno = notas.find(n =>
    normalizar(n.ALUNO) === nomeAluno
  );

  const div = document.getElementById("notas");

  if (!notaAluno) {
    div.innerHTML = `
      <h3>${aluno.ALUNO}</h3>
      <p>❌ Notas não encontradas</p>
    `;
    return;
  }

  // tentativa de pegar campos simples
  const mat = notaAluno["MATEMATICA"] || notaAluno["MATEMATICA 2700"] || "-";
  const port = notaAluno["LINGUA PORTUGUESA"] || "-";
  const hist = notaAluno["HISTORIA"] || "-";
  const geo = notaAluno["GEOGRAFIA"] || "-";
  const freq = notaAluno["Fre(%)"] || "-";

  div.innerHTML = `
    <h2>${notaAluno.ALUNO}</h2>

    <p><b>Matemática:</b> ${mat}</p>
    <p><b>Português:</b> ${port}</p>
    <p><b>História:</b> ${hist}</p>
    <p><b>Geografia:</b> ${geo}</p>
    <p><b>Frequência:</b> ${freq}</p>
  `;
}

carregarDados();

</script>

</body>
</html>
