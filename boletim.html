<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 5</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* ALUNO */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: red;
}

/* INFO */
.info {
    flex: 1;
    font-size: 14px;
}

/* TABELA */
.table-wrapper {
    overflow-x: auto;
    margin-top: 10px;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
    font-size: 13px;
}

th {
    background: #0077cc;
    color: white;
}
</style>

</head>

<body>

<div class="container">

    <div class="topo">
        <h2>📊 Boletim Escolar</h2>

        <select id="salaSelect">
            <option value="6apb.json">6º Ano A</option>
            <option value="7apb.json">7º Ano A</option>
            <option value="8apb.json">8º Ano A</option>
        </select>
    </div>

    <div id="boletim"></div>
</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

let URL_NOTAS = "6apb.json";

let notas = {};

// 📸 FOTO
function montarFoto(id) {
    if (!id) return null;

    id = String(id).trim();
    if (id.length < 10) return null;

    return "https://lh3.googleusercontent.com/d/" + id;
}

// 🔢 VALOR SEGURO (mantém "-")
function valorSeguro(v) {
    return (v === null || v === undefined) ? "-" : v;
}

// 📥 CARREGAR DADOS
async function carregar() {
    try {
        const res = await fetch(URL_NOTAS);
        notas = await res.json();

        montarBoletim();

    } catch (e) {
        console.error("❌ ERRO:", e);
    }
}

// 📊 BOLETIM (CORRETO)
function montarBoletim() {

    const container = document.getElementById("boletim");
    container.innerHTML = "";

    const alunos = Object.values(notas); // 👈 AQUI ESTÁ A CORREÇÃO PRINCIPAL

    alunos.forEach(aluno => {

        if (!aluno || !aluno.disciplinas) return;

        const fotoFinal = montarFoto(aluno.foto);

        const fotoHTML = fotoFinal
            ? `<img class="foto" src="${fotoFinal}">`
            : `<div class="sem-foto">❌</div>`;

        const div = document.createElement("div");
        div.className = "aluno";

        div.innerHTML = `
            ${fotoHTML}

            <div class="info">
                <strong>${aluno.nome}</strong><br>
                RA: ${aluno.numero || '-'}<br>
                Situação: ${aluno.situacao || '-'}

                <div class="table-wrapper">
                    ${gerarTabela(aluno.disciplinas)}
                </div>

                <small>
                    Faltas acumuladas: ${aluno.totais?.faltas_acumuladas ?? '-'} |
                    Frequência: ${aluno.totais?.frequencia ?? '-'}
                </small>
            </div>
        `;

        container.appendChild(div);
    });
}

// 📊 TABELA FIEL AO JSON
function gerarTabela(disciplinas) {
    if (!disciplinas) return "<p>Sem disciplinas</p>";

    let html = `
    <table>
        <thead>
            <tr>
                <th>Disciplina</th>
                <th>Chamada</th>
                <th>Média</th>
                <th>Faltas</th>
                <th>Acumulado</th>
            </tr>
        </thead>
        <tbody>
    `;

    Object.keys(disciplinas).forEach(nome => {
        const d = disciplinas[nome];

        html += `
        <tr>
            <td>${nome}</td>
            <td>${valorSeguro(d.numero)}</td>
            <td>${valorSeguro(d.media)}</td>
            <td>${valorSeguro(d.faltas)}</td>
            <td>${valorSeguro(d.acumulado)}</td>
        </tr>
        `;
    });

    html += `
        </tbody>
    </table>
    `;

    return html;
}

// 🔁 TROCA DE SALA
document.getElementById("salaSelect").addEventListener("change", (e) => {
    URL_NOTAS = e.target.value;
    carregar();
});

carregar();

</script>

</body>
</html>
