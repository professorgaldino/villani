<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Boletim Geral</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

h1 {
  text-align: center;
}

#lista {
  max-height: 300px;
  overflow-y: auto;
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.aluno {
  padding: 8px;
  border-bottom: 1px solid #ddd;
  cursor: pointer;
}

.aluno:hover {
  background: #eee;
}

#boletim {
  background: white;
  padding: 20px;
  border-radius: 10px;
}

img {
  width: 120px;
  border-radius: 10px;
}
</style>

</head>
<body>

<h1>📋 Boletim Geral</h1>

<div id="lista">Carregando alunos...</div>

<div id="boletim">
Clique em um aluno
</div>

<script>

// 🔗 LINKS DOS APPS SCRIPT (SEUS)
const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";
const URL_NOTAS  = "https://script.google.com/macros/s/AKfycbx6ijQUGAagM-Jvfj07eD4I1eIquYvMeGCZhm26qp9KRAEWaYIYJeqvrZA3cHJcpmBT/exec";

// normalizar texto (ESSENCIAL pra bater nome)
function normalizar(txt) {
  return txt
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

// carregar alunos
async function carregarAlunos() {

  try {

    const res = await fetch(URL_ALUNOS);
    const alunos = await res.json();

    const lista = document.getElementById("lista");
    lista.innerHTML = "";

    alunos.forEach((aluno, i) => {

      const div = document.createElement("div");
      div.className = "aluno";

      div.innerText = `${i+1} - ${aluno.nome}`;

      div.onclick = () => carregarBoletim(aluno);

      lista.appendChild(div);
    });

  } catch (e) {
    document.getElementById("lista").innerText = "Erro ao carregar alunos";
  }
}

// carregar boletim
async function carregarBoletim(aluno) {

  document.getElementById("boletim").innerHTML = "Carregando...";

  try {

    const res = await fetch(URL_NOTAS);
    const notas = await res.json();

    // 🔥 RELAÇÃO POR NOME + SALA
    const notaAluno = notas.find(n =>
      normalizar(n.ALUNO) === normalizar(aluno.nome) &&
      normalizar(n.sala) === normalizar(aluno.sala)
    );

    if (!notaAluno) {
      document.getElementById("boletim").innerHTML = "Aluno não encontrado nas notas";
      return;
    }

    document.getElementById("boletim").innerHTML = `
      <h2>${aluno.nome}</h2>

      <img src="https://drive.google.com/uc?export=view&id=${aluno.foto}">

      <p><b>Sala:</b> ${aluno.sala}</p>
      <p><b>Tutor:</b> ${aluno.tutor}</p>

      <hr>

      <h3>📊 Notas</h3>

      <pre style="white-space: pre-wrap;">
${JSON.stringify(notaAluno, null, 2)}
      </pre>
    `;

  } catch (e) {
    document.getElementById("boletim").innerHTML = "Erro ao carregar notas";
  }
}

// iniciar
carregarAlunos();

</script>

</body>
</html>
