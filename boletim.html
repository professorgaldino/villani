<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Boletim Geral</title>

<style>
body { font-family: Arial; text-align:center; background:#f5f5f5; }

select {
  padding:10px;
  font-size:16px;
  margin-top:20px;
}

#lista button {
  display:block;
  width:300px;
  margin:5px auto;
  padding:10px;
  border:none;
  border-radius:5px;
  background:#eee;
  cursor:pointer;
}

#lista button:hover {
  background:#2259f2;
  color:white;
}
</style>
</head>

<body>

<h1>Boletim Geral</h1>

<select id="sala">
  <option value="">Selecione a sala</option>
</select>

<div id="lista"></div>

<script>

const ALUNOS_ID = "2PACX-1vRErpxipk_S3WA3Ar2ZznvdZidvrvW4ZvHXpf3GGk_MH26-wHdD941VKyqmIcIaWnF0UmNKTNERAlUO";
const ALUNOS_ABA = "alunos";

/* ========= FETCH ========= */

async function fetchSheet() {
  const url = `https://opensheet.elk.sh/${ALUNOS_ID}/${ALUNOS_ABA}`;
  const res = await fetch(url);
  return await res.json();
}

/* ========= NORMALIZAR ========= */

function normalizar(txt) {
  return String(txt).toUpperCase().trim();
}

/* ========= CARREGAR SALAS ========= */

async function iniciar() {

  const alunos = await fetchSheet();

  const salas = [...new Set(alunos.map(a => a.sala))];

  const select = document.getElementById("sala");

  salas.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s;
    select.appendChild(opt);
  });

  select.addEventListener("change", () => {
    carregarLista(alunos, select.value);
  });
}

/* ========= LISTA ========= */

function carregarLista(alunos, sala) {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  const filtrados = alunos
    .filter(a => normalizar(a.sala) === normalizar(sala))
    .sort((a, b) => a.nome.localeCompare(b.nome));

  filtrados.forEach((aluno, i) => {

    const btn = document.createElement("button");

    btn.textContent = `${i + 1} - ${aluno.nome}`;

    btn.onclick = () => {
      const url = `boletim.html?sala=${encodeURIComponent(aluno.sala)}&nome=${encodeURIComponent(aluno.nome)}`;
      window.location.href = url;
    };

    lista.appendChild(btn);
  });
}

iniciar();

</script>

</body>
</html>
