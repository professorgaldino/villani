<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar - 4 Bimestres</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1400px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    border-radius: 10px;
}

/* INFO */
.info {
    flex: 1;
    font-size: 14px;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 5px;
    text-align: center;
}

th {
    background: #0077cc;
    color: white;
}

/* vazio */
.vazio {
    background: #e8ddff;
}

/* bimestre não lançado */
.nao-lancado {
    background: #ffe6e6;
    color: #b30000;
    font-weight: bold;
}

.eletiva-box {
    margin-top: 6px;
    padding: 6px;
    background: #f3e8ff;
    border-radius: 8px;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim 4 Bimestres</h2>

    <select id="salaSelect">
        <option value="6a">6º Ano A</option>
        <option value="7a">7º Ano A</option>
        <option value="8a">8º Ano A</option>
    </select>
</div>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS =
"https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

let baseSala = "6a";
let alunos = [];
let notas = [];

// 📸 FOTO
function montarFoto(id) {
    if (!id) return null;
    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

// 🔤 normalizar
function normalizar(t) {
    return (t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// 🔢 valor seguro
function v(x) {
    return (x === null || x === undefined) ? "-" : x;
}

// 📦 bimestres fixos
const bimestres = [
    {label:"1º Bim", suf:"pb"},
    {label:"2º Bim", suf:"sb"},
    {label:"3º Bim", suf:"tb"},
    {label:"4º Bim", suf:"qb"}
];

// 📥 carregar todos bimestres
async function carregar() {

    const resAlunos = await fetch(URL_ALUNOS);
    alunos = await resAlunos.json();

    const promessas = bimestres.map(async b => {
        try {
            const res = await fetch(`${baseSala}${b.suf}.json`);
            return await res.json();
        } catch {
            return null;
        }
    });

    notas = await Promise.all(promessas);

    montar();
}

// 📊 montar boletim
function montar() {

    const box = document.getElementById("boletim");
    box.innerHTML = "";

    const mapaAlunos = {};
    alunos.forEach(a => mapaAlunos[normalizar(a.nome)] = a);

    const base = notas[0] || {};

    Object.values(base).forEach(a => {

        const alunoBase = mapaAlunos[normalizar(a.nome)];

        const foto = alunoBase ? montarFoto(alunoBase.foto) : null;

        const fotoHTML = foto
            ? `<img class="foto" src="${foto}">`
            : `<div class="sem-foto">❌</div>`;

        // eletivas
        let eletivas = "";
        if (alunoBase?.eletiva1 || alunoBase?.eletiva2) {
            eletivas = `
            <div class="eletiva-box">
                <strong>Eletivas</strong><br>
                Eletiva 1º Semestre: ${alunoBase.eletiva1 || "Sem eletiva"}<br>
                Eletiva 2º Semestre: ${alunoBase.eletiva2 || "Sem eletiva"}
            </div>`;
        } else {
            eletivas = `
            <div class="eletiva-box">
                <strong>Sem eletiva</strong>
            </div>`;
        }

        // disciplinas união
        const disciplinas = Object.keys(a.disciplinas || {});

        let tabela = `
        <table>
            <tr>
                <th>Disciplina</th>`;

        bimestres.forEach(b => {
            tabela += `<th>${b.label}</th>`;
        });

        tabela += `</tr>`;

        disciplinas.forEach(nome => {

            tabela += `<tr><td>${nome.replaceAll("_"," ")}</td>`;

            bimestres.forEach((b, i) => {

                const dadosBim = notas[i]?.[Object.keys(notas[i] || {}).find(k =>
                    normalizar(notas[i][k]?.nome) === normalizar(a.nome)
                )];

                const d = dadosBim?.disciplinas?.[nome];

                if (!dadosBim || !d) {
                    tabela += `<td class="nao-lancado">Bimestre não lançado</td>`;
                } else {
                    tabela += `<td>${v(d.numero)}</td>`;
                }
            });

            tabela += `</tr>`;
        });

        tabela += `</table>`;

        box.innerHTML += `
        <div class="aluno">

            ${fotoHTML}

            <div class="info">

                <strong>${a.nome}</strong><br>

                RA: ${alunoBase?.ra || "-"}<br>
                Tutor: ${alunoBase?.tutor || "-"}<br>

                ${eletivas}

                <br>

                ${tabela}

                <br>

                📌 Faltas acumuladas: ${v(a.totais?.faltas_acumuladas)}<br>
                📊 Frequência: ${v(a.totais?.frequencia)}%
            </div>

        </div>`;
    });
}

// 🔁 troca sala
document.getElementById("salaSelect").addEventListener("change", e => {
    baseSala = e.target.value;
    carregar();
});

carregar();

</script>

</body>
</html>
