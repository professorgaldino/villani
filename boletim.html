<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boletim Escolar PRO</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    padding:15px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

select{
    padding:8px;
    border-radius:6px;
}

.navegacao-alunos{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin:15px 0;
}

.btn-aluno{
    width:42px;
    height:42px;
    border:none;
    border-radius:8px;
    background:#0077cc;
    color:white;
    cursor:pointer;
}

.btn-aluno.ativo{
    background:#28a745;
}

.aluno{
    background:white;
    padding:12px;
    border-radius:12px;
    display:flex;
    gap:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.info{flex:1}

.nao-lancado{
    background:#fff3cd;
    padding:10px;
    border-radius:8px;
    font-weight:bold;
}

.baixa-nota{
    color:red;
    font-weight:bold;
}

/* DASHBOARD */
#popupDashboard{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    overflow:auto;
    z-index:9999;
}

.dashboard-box{
    background:white;
    max-width:1200px;
    margin:30px auto;
    padding:20px;
    border-radius:12px;
    position:relative;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim PRO</h2>

    <select id="salaSelect">
        <option value="6a">6º A</option>
        <option value="6b">6º B</option>
        <option value="7a">7º A</option>
        <option value="7b">7º B</option>
    </select>
</div>

<div id="navegacaoAlunos"></div>

<button onclick="abrirDashboard()">📊 Dashboard Power BI</button>

<div id="popupDashboard">
    <div class="dashboard-box">

        <button onclick="fecharDashboard()" style="position:absolute;right:10px;top:10px;">X</button>

        <h2>Dashboard Escolar</h2>

        <select id="dashboardBimestre" onchange="gerarDashboard()">
            <option value="1">1º Bimestre</option>
            <option value="2">2º Bimestre</option>
            <option value="3">3º Bimestre</option>
            <option value="4">4º Bimestre</option>
        </select>

        <div id="dashboardConteudo"></div>

    </div>
</div>

<div id="boletim"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const BIM = {1:"1",2:"2",3:"3",4:"4"};

let serie = "6a";
let alunos = [];
let dadosBimestres = {};
let grafico = null;

/* =========================
   UTIL
========================= */

function normalizar(t){
    return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim();
}

/* =========================
   CARREGAMENTO
========================= */

async function carregarAlunos(){
    const res = await fetch(URL_ALUNOS);
    alunos = await res.json();
}

async function carregarBimestre(n){
    try{
        const res = await fetch(`${serie}/${BIM[n]}.json`);
        if(!res.ok) return null;
        return await res.json();
    }catch{
        return null;
    }
}

async function carregar(){
    await carregarAlunos();

    for(let i=1;i<=4;i++){
        dadosBimestres[i] = await carregarBimestre(i);
    }
}

/* =========================
   INICIALIZAÇÃO
========================= */

async function iniciar(){
    await carregar();

    montarNavegacao();

    const base = dadosBimestres[1];

    if(base && Object.keys(base).length>0){
        mostrarAluno(0);
    }
}

iniciar();

/* =========================
   NAVEGAÇÃO
========================= */

function montarNavegacao(){

    const nav = document.getElementById("navegacaoAlunos");
    nav.innerHTML="";

    const base = dadosBimestres[1];
    if(!base) return;

    Object.values(base).forEach((a,i)=>{
        nav.innerHTML += `
        <button class="btn-aluno ${i===0?'ativo':''}" onclick="mostrarAluno(${i})">${i+1}</button>
        `;
    });
}

/* =========================
   ALUNO
========================= */

function mostrarAluno(i){

    const base = Object.values(dadosBimestres[1]||{});
    const a = base[i];
    if(!a) return;

    document.getElementById("boletim").innerHTML = `
        <div class="aluno">
            <div class="info">
                <h3>${a.nome}</h3>
                ${montarTabela(a.nome)}
            </div>
        </div>
    `;
}

/* =========================
   TABELA
========================= */

function montarTabela(nome){

    const aluno = Object.values(dadosBimestres[1]||{}).find(a=>a.nome===nome);

    if(!aluno) return "Sem dados";

    let html = "<table border='1' width='100%'><tr><th>Disciplina</th><th>Nota</th></tr>";

    for(let d in aluno.disciplinas){

        const n = aluno.disciplinas[d].numero;

        html += `
        <tr>
            <td>${d}</td>
            <td class="${Number(n)<5?'baixa-nota':''}">${n}</td>
        </tr>
        `;
    }

    return html + "</table>";
}

/* =========================
   DASHBOARD POWER BI
========================= */

function abrirDashboard(){
    document.getElementById("popupDashboard").style.display="block";
    gerarDashboard();
}

function fecharDashboard(){
    document.getElementById("popupDashboard").style.display="none";
}

function gerarDashboard(){

    const b = document.getElementById("dashboardBimestre").value;
    const dados = dadosBimestres[b];

    if(!dados){
        document.getElementById("dashboardConteudo").innerHTML =
        "<div class='nao-lancado'>Sem dados do bimestre</div>";
        return;
    }

    let total=0;
    let soma=0;
    let risco=0;

    let faixas = {"0-4":0,"5-6":0,"7-8":0,"9-10":0};

    let ranking = [];

    Object.values(dados).forEach(a=>{

        let abaixo=0;
        let somaAluno=0;
        let qtd=0;

        for(let d in a.disciplinas){

            const n = Number(a.disciplinas[d].numero);

            if(!isNaN(n)){
                soma += n;
                total++;

                somaAluno += n;
                qtd++;

                if(n<5){
                    abaixo++;
                    faixas["0-4"]++;
                }else if(n<7){
                    faixas["5-6"]++;
                }else if(n<9){
                    faixas["7-8"]++;
                }else{
                    faixas["9-10"]++;
                }
            }
        }

        if(abaixo>=3) risco++;

        ranking.push({
            nome:a.nome,
            media:somaAluno/qtd
        });
    });

    ranking.sort((a,b)=>b.media-a.media);

    let mediaGeral = (soma/total).toFixed(1);

    document.getElementById("dashboardConteudo").innerHTML = `

        <div style="display:flex;gap:10px;margin-bottom:15px;">
            <div style="background:#0077cc;color:white;padding:10px;border-radius:8px;">👨‍🎓 Alunos: ${Object.keys(dados).length}</div>
            <div style="background:#28a745;color:white;padding:10px;border-radius:8px;">📊 Média: ${mediaGeral}</div>
            <div style="background:#dc3545;color:white;padding:10px;border-radius:8px;">⚠ Risco: ${risco}</div>
        </div>

        <canvas id="grafico"></canvas>

        <h3>🏆 Ranking</h3>
        <table border="1" width="100%">
        ${ranking.slice(0,10).map(r=>`
            <tr><td>${r.nome}</td><td>${r.media.toFixed(1)}</td></tr>
        `).join("")}
        </table>
    `;

    setTimeout(()=>{

        if(grafico) grafico.destroy();

        grafico = new Chart(document.getElementById("grafico"),{
            type:"bar",
            data:{
                labels:Object.keys(faixas),
                datasets:[{
                    label:"Notas",
                    data:Object.values(faixas)
                }]
            }
        });

    },200);
}

/* =========================
   TROCA SÉRIE
========================= */

document.getElementById("salaSelect").addEventListener("change",e=>{
    serie = e.target.value;
    iniciar();
});

</script>

</body>
</html>
