<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DEBUG COMPLETO BOLETIM 2</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
}

/* DEBUG BOX */
.debugBox {
    background: #111;
    color: #00ff88;
    padding: 10px;
    font-size: 11px;
    white-space: pre-wrap;
    margin-bottom: 10px;
    border-radius: 8px;
    max-height: 250px;
    overflow: auto;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    border-radius: 10px;
}

.info {
    flex: 1;
    font-size: 14px;
}

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

th {
    background: #0077cc;
    color: white;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>🧪 DEBUG COMPLETO</h2>

    <select id="salaSelect">
        <option value="6apb.json">6º Ano A</option>
        <option value="7apb.json">7º Ano A</option>
        <option value="8apb.json">8º Ano A</option>
    </select>
</div>

<!-- 🔥 DEBUG ALUNOS (APPSCRIPT) -->
<h3>🧾 JSON ALUNOS (APPSCRIPT)</h3>
<div id="debugAlunos" class="debugBox"></div>

<!-- 🔥 DEBUG NOTAS -->
<h3>🧾 JSON NOTAS (SALA)</h3>
<div id="debugNotas" class="debugBox"></div>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

let URL_NOTAS = "6apb.json";

let alunos = [];
let notas = {};

// 📸 FOTO
function montarFoto(id) {
    if (!id) return null;
    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

function normalizar(t) {
    return (t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

function v(x) {
    return (x === null || x === undefined) ? "-" : x;
}

// 📥 CARREGAR
async function carregar() {

    console.log("📥 carregando ALUNOS...");
    const resAlunos = await fetch(URL_ALUNOS);
    alunos = await resAlunos.json();

    console.log("📥 carregando NOTAS...");
    const resNotas = await fetch(URL_NOTAS);
    notas = await resNotas.json();

    // 🔥 DEBUG VISUAL NA TELA
    document.getElementById("debugAlunos").textContent =
        JSON.stringify(alunos, null, 2);

    document.getElementById("debugNotas").textContent =
        JSON.stringify(notas, null, 2);

    montar();
}

// 📊 BOLETIM
function montar() {

    const box = document.getElementById("boletim");
    box.innerHTML = "";

    const mapaAlunos = {};
    alunos.forEach(a => {
        mapaAlunos[normalizar(a.nome)] = a;
    });

    const lista = Object.values(notas);

    lista.forEach(a => {

        const alunoBase = mapaAlunos[normalizar(a.nome)];
        const foto = alunoBase ? montarFoto(alunoBase.foto) : null;

        let disciplinasHTML = "";

        for (let nome in a.disciplinas) {

            const d = a.disciplinas[nome];

            disciplinasHTML += `
            <tr>
                <td>${nome}</td>
                <td>${v(d.numero)}</td>
                <td>${v(d.media)}</td>
                <td>${v(d.faltas)}</td>
            </tr>`;
        }

        box.innerHTML += `
        <div class="aluno">

            ${foto ? `<img class="foto" src="${foto}">` : `<div class="sem-foto">❌</div>`}

            <div class="info">

                <strong>${a.nome}</strong><br>
                RA: ${alunoBase?.ra || '-'}<br>
                Tutor: ${alunoBase?.tutor || '-'}<br>

                <table>
                    <tr>
                        <th>Disciplina</th>
                        <th>Chamada</th>
                        <th>Média</th>
                        <th>Faltas</th>
                    </tr>

                    ${disciplinasHTML}
                </table>

            </div>
        </div>
        `;
    });
}

// 🔁 SALA
document.getElementById("salaSelect").addEventListener("change", e => {
    URL_NOTAS = e.target.value;
    carregar();
});

carregar();

</script>

</body>
</html>
