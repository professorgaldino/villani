<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Boletim Escolar DBG 3</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

select {
  padding: 8px;
  margin-bottom: 20px;
}

.aluno {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 20px;
  display: flex;
  gap: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.aluno img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
}

th {
  background: #0077cc;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Boletim Escolar</h2>

<select id="salaSelect" onchange="carregarDados()">
  <option value="6a">6º A</option>
  <option value="6b">6º B</option>
  <option value="6c">6º C</option>
  <option value="7a">7º A</option>
  <option value="7b">7º B</option>
</select>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const SALAS = {
  "6a": "6apb.json",
  "6b": "6bpb.json",
  "6c": "6cpb.json",
  "7a": "7apb.json",
  "7b": "7bpb.json"
};

// 🔥 normalizador de nome
function normalizar(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

async function carregarDados() {
  const sala = document.getElementById("salaSelect").value;

  console.clear();
  console.log("📌 Sala selecionada:", sala);

  try {
    const resAlunos = await fetch(URL_ALUNOS);
    const alunos = await resAlunos.json();

    const resNotas = await fetch(SALAS[sala]);
    const notas = await resNotas.json();

    console.log("👥 Total alunos carregados:", alunos.length);
    console.log("📦 JSON exemplo:", Object.values(notas)[0]);

    montarBoletim(alunos, notas, sala);

  } catch (e) {
    console.error("🔥 ERRO GERAL:", e);
  }
}

function montarBoletim(alunos, notas, salaSelecionada) {

  const container = document.getElementById("boletim");
  container.innerHTML = "";

  const notasPorNome = {};

  let totalNotas = 0;

  for (let key in notas) {
    const alunoNota = notas[key];

    if (!alunoNota || !alunoNota.nome) continue;

    const nomeNorm = normalizar(alunoNota.nome);
    notasPorNome[nomeNorm] = alunoNota;
    totalNotas++;
  }

  console.log("📊 Total alunos com nota:", totalNotas);

  const alunosSala = alunos.filter(a =>
    normalizar(a.sala) === normalizar(salaSelecionada)
  );

  console.log("🎯 Alunos na sala:", alunosSala.length);

  alunosSala.forEach(aluno => {

    const nomeNorm = normalizar(aluno.nome);
    const dadosNota = notasPorNome[nomeNorm];

    if (!dadosNota) {
      console.warn("❌ SEM NOTA:", aluno.nome);
      return;
    }

    const div = document.createElement("div");
    div.className = "aluno";

    div.innerHTML = `
      <img src="${aluno.foto || ''}" />

      <div class="info">
        <strong>${aluno.nome}</strong><br>
        RA: ${aluno.ra || '-'}<br>
        Tutor: ${aluno.tutor || '-'}<br>

        ${gerarTabela(dadosNota.disciplinas, aluno.nome)}
      </div>
    `;

    container.appendChild(div);
  });
}

function gerarTabela(disciplinas, nomeAluno) {

  if (!disciplinas) {
    console.warn("⚠️ Sem disciplinas:", nomeAluno);
    return "<p style='color:red'>Sem disciplinas</p>";
  }

  let html = `
    <table>
      <tr>
        <th>Disciplina</th>
        <th>1º</th>
        <th>2º</th>
        <th>3º</th>
        <th>4º</th>
        <th>Faltas</th>
      </tr>
  `;

  for (let nome in disciplinas) {

    const d = disciplinas[nome];

    if (!d) {
      console.warn("⚠️ disciplina inválida:", nome, nomeAluno);
      continue;
    }

    const notas = Array.isArray(d.notas)
      ? d.notas
      : ["-", "-", "-", "-"];

    html += `
      <tr>
        <td>${nome}</td>
        <td>${notas[0] ?? "-"}</td>
        <td>${notas[1] ?? "-"}</td>
        <td>${notas[2] ?? "-"}</td>
        <td>${notas[3] ?? "-"}</td>
        <td>${d.faltas_acumuladas ?? "-"}</td>
      </tr>
    `;
  }

  html += "</table>";

  return html;
}

carregarDados();

</script>

</body>
</html>
