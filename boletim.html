<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Boletim Escolar 2</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

select {
  padding: 8px;
  margin-bottom: 20px;
}

.aluno {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 20px;
  display: flex;
  gap: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.aluno img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
}

th {
  background: #0077cc;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Boletim Escolar</h2>

<select id="salaSelect" onchange="carregarDados()">
  <option value="6a">6º A</option>
  <option value="6b">6º B</option>
  <option value="6c">6º C</option>
</select>

<div id="boletim"></div>

</div>

<script>

// 🔗 SUA API (APP SCRIPT)
const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

// 📚 Bimestres
const BIMESTRES = ["pb", "sb", "tb", "qb"];

// 🔧 Normaliza texto (ESSENCIAL)
function normalizar(txt) {
  return (txt || "")
    .toString()
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/º/g, "")
    .replace(/\s+/g, "")
    .trim();
}

// 🔄 Ajusta sala (resolve 6º A, 6 A, etc)
function normalizarSala(sala) {
  return normalizar(sala);
}

async function carregarDados() {

  const sala = document.getElementById("salaSelect").value;
  const salaNorm = normalizarSala(sala);

  console.log("📌 Sala selecionada:", salaNorm);

  try {
    // 🔹 busca alunos
    const resAlunos = await fetch(URL_ALUNOS);
    const alunos = await resAlunos.json();

    console.log("👥 Alunos carregados:", alunos.length);

    // 🔹 filtra alunos da sala
    const alunosSala = alunos.filter(a =>
      normalizarSala(a.sala) === salaNorm
    );

    console.log("🎯 Alunos da sala:", alunosSala.length);

    // 🔹 tenta carregar TODOS os bimestres
    const dadosBimestres = [];

    for (let b of BIMESTRES) {
      const arquivo = `${salaNorm}${b}.json`;

      try {
        const res = await fetch(arquivo);

        if (!res.ok) throw new Error("não existe");

        const json = await res.json();

        console.log("✅ JSON carregado:", arquivo);

        dadosBimestres.push(json);

      } catch {
        console.warn("⚠️ JSON não encontrado:", arquivo);
      }
    }

    montarBoletim(alunosSala, dadosBimestres);

  } catch (erro) {
    console.error("❌ Erro geral:", erro);
  }
}

function montarBoletim(alunos, listaBimestres) {

  const container = document.getElementById("boletim");
  container.innerHTML = "";

  // 🔹 junta todos os JSONs
  const notasPorNome = {};

  listaBimestres.forEach(json => {
    for (let key in json) {
      const aluno = json[key];
      if (!aluno.nome) continue;

      const nome = normalizar(aluno.nome);

      if (!notasPorNome[nome]) {
        notasPorNome[nome] = aluno;
      } else {
        // 🔥 mescla disciplinas
        Object.assign(
          notasPorNome[nome].disciplinas,
          aluno.disciplinas
        );
      }
    }
  });

  alunos.forEach(aluno => {

    const nome = normalizar(aluno.nome);
    const dados = notasPorNome[nome];

    if (!dados) {
      console.warn("❌ Sem nota:", aluno.nome);
      return;
    }

    const div = document.createElement("div");
    div.className = "aluno";

    div.innerHTML = `
      <img src="${aluno.foto || 'https://via.placeholder.com/100'}">

      <div class="info">
        <strong>${aluno.nome}</strong><br>
        RA: ${aluno.ra}<br>
        Tutor: ${aluno.tutor || "-"}<br>

        ${gerarTabela(dados.disciplinas)}
      </div>
    `;

    container.appendChild(div);
  });
}

function gerarTabela(disciplinas) {

  let html = `
    <table>
      <tr>
        <th>Disciplina</th>
        <th>1º</th>
        <th>2º</th>
        <th>3º</th>
        <th>4º</th>
        <th>Faltas</th>
      </tr>
  `;

  for (let nome in disciplinas) {
    const d = disciplinas[nome];

    html += `
      <tr>
        <td>${nome}</td>
        <td>${d.notas[0]}</td>
        <td>${d.notas[1]}</td>
        <td>${d.notas[2]}</td>
        <td>${d.notas[3]}</td>
        <td>${d.faltas_acumuladas}</td>
      </tr>
    `;
  }

  html += "</table>";

  return html;
}

// 🚀 inicia
carregarDados();

</script>

</body>
</html>
