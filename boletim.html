<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 6</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

/* TOPO */
.topo {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: red;
}

/* INFO */
.info {
    flex: 1;
    font-size: 14px;
}

/* DISCIPLINAS LISTA */
.disciplina {
    margin-top: 10px;
    padding: 6px;
    border-bottom: 1px solid #eee;
}

.disciplina strong {
    display: inline-block;
    width: 100%;
    margin-bottom: 4px;
    color: #0077cc;
}
</style>

</head>

<body>

<div class="container">

    <div class="topo">
        <h2>📊 Boletim Escolar</h2>

        <select id="salaSelect">
            <option value="6apb.json">6º Ano A</option>
            <option value="7apb.json">7º Ano A</option>
            <option value="8apb.json">8º Ano A</option>
        </select>
    </div>

    <div id="boletim"></div>
</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

let URL_NOTAS = "6apb.json";

let alunos = [];
let notas = {};

// 📸 FOTO
function montarFoto(id) {
    if (!id) return null;

    id = String(id).trim();
    if (id.length < 10) return null;

    return "https://lh3.googleusercontent.com/d/" + id;
}

// 🔢 VALOR SEGURO
function valorSeguro(v) {
    return (v === null || v === undefined) ? "-" : v;
}

// 📥 CARREGAR
async function carregar() {
    try {
        const resAlunos = await fetch(URL_ALUNOS);
        alunos = await resAlunos.json();

        const resNotas = await fetch(URL_NOTAS);
        notas = await resNotas.json();

        montarBoletim();

    } catch (e) {
        console.error("❌ ERRO:", e);
    }
}

// 📊 BOLETIM LIMPO
function montarBoletim() {

    const container = document.getElementById("boletim");
    container.innerHTML = "";

    const mapaNotas = {};

    for (let key in notas) {
        const aluno = notas[key];
        if (!aluno?.nome) continue;

        mapaNotas[aluno.nome] = aluno;
    }

    alunos.forEach(aluno => {

        const dados = mapaNotas[aluno.nome];
        if (!dados) return;

        const fotoFinal = montarFoto(aluno.foto);

        const fotoHTML = fotoFinal
            ? `<img class="foto" src="${fotoFinal}">`
            : `<div class="sem-foto">❌</div>`;

        const disciplinasHTML = Object.keys(dados.disciplinas)
            .map(nome => {
                const d = dados.disciplinas[nome];

                return `
                <div class="disciplina">
                    <strong>${nome}</strong><br>
                    Chamada: ${valorSeguro(d.numero)} |
                    Média: ${valorSeguro(d.media)} |
                    Faltas: ${valorSeguro(d.faltas)} |
                    Acumulado: ${valorSeguro(d.acumulado)}
                </div>
                `;
            })
            .join("");

        const div = document.createElement("div");
        div.className = "aluno";

        div.innerHTML = `
            ${fotoHTML}

            <div class="info">
                <strong>${aluno.nome}</strong><br>
                RA: ${aluno.ra || '-'}<br>
                Tutor: ${aluno.tutor || '-'}

                ${disciplinasHTML}
            </div>
        `;

        container.appendChild(div);
    });
}

// 🔁 TROCA DE SALA
document.getElementById("salaSelect").addEventListener("change", (e) => {
    URL_NOTAS = e.target.value;
    carregar();
});

carregar();

</script>

</body>
</html>
