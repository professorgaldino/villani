<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Boletim Escolar</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f8;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

select {
  padding: 8px;
  margin: 5px;
}

.aluno {
  background: white;
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 20px;
  display: flex;
  gap: 15px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.aluno img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 10px;
}

.info {
  flex: 1;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 10px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  text-align: center;
}

th {
  background: #0077cc;
  color: white;
}
</style>
</head>

<body>

<div class="container">

<h2>Boletim Escolar</h2>

<!-- SALA -->
<select id="salaSelect" onchange="carregarDados()">
  <option value="6a">6º A</option>
  <option value="6b">6º B</option>
</select>

<!-- BIMESTRE -->
<select id="bimestreSelect" onchange="carregarDados()">
  <option value="pb">1º Bimestre</option>
  <option value="sb">2º Bimestre</option>
  <option value="tb">3º Bimestre</option>
  <option value="qb">4º Bimestre</option>
</select>

<div id="boletim"></div>

</div>

<script>

// 🔗 APP SCRIPT
const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

// 🔥 NORMALIZADOR
function normalizar(texto) {
  return (texto || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

async function carregarDados() {

  const sala = document.getElementById("salaSelect").value;
  const bimestre = document.getElementById("bimestreSelect").value;

  // 🔥 monta nome do arquivo automaticamente
  const arquivo = `${sala}${bimestre}.json`;

  try {

    const resAlunos = await fetch(URL_ALUNOS);
    const alunos = await resAlunos.json();

    let notas = {};

    try {
      const resNotas = await fetch(arquivo);
      notas = await resNotas.json();
    } catch {
      console.warn("Arquivo não encontrado:", arquivo);
    }

    montarBoletim(alunos, notas, sala);

  } catch (erro) {
    console.error("Erro geral:", erro);
  }
}

function montarBoletim(alunos, notas, salaSelecionada) {

  const container = document.getElementById("boletim");
  container.innerHTML = "";

  // 🔥 mapa de notas por nome
  const mapaNotas = {};

  for (let key in notas) {
    const alunoNota = notas[key];

    if (!alunoNota.nome || !alunoNota.disciplinas) continue;

    const nome = normalizar(alunoNota.nome);
    mapaNotas[nome] = alunoNota;
  }

  const alunosSala = alunos.filter(a =>
    normalizar(a.sala) === normalizar(salaSelecionada)
  );

  alunosSala.forEach(aluno => {

    const nome = normalizar(aluno.nome);
    const dadosNota = mapaNotas[nome];

    // 🔥 só mostra se tiver nota
    if (!dadosNota || Object.keys(dadosNota.disciplinas).length === 0) {
      return;
    }

    const div = document.createElement("div");
    div.className = "aluno";

    div.innerHTML = `
      <img src="${aluno.foto || 'https://via.placeholder.com/100'}" />

      <div class="info">
        <strong>${aluno.nome}</strong><br>
        RA: ${aluno.ra || "-"}<br>
        Nº: ${aluno.numero || "-"}<br>

        ${gerarTabela(dadosNota.disciplinas)}
      </div>
    `;

    container.appendChild(div);
  });
}

function gerarTabela(disciplinas) {

  let html = `
    <table>
      <tr>
        <th>Disciplina</th>
        <th>Nota</th>
        <th>Faltas</th>
      </tr>
  `;

  for (let nome in disciplinas) {

    const d = disciplinas[nome];

    // 🔥 pega apenas o bimestre atual (primeira posição com valor)
    const nota = d.notas.find(n => n !== "-") || "-";
    const falta = d.faltas.find(f => f !== "-") || "-";

    html += `
      <tr>
        <td>${nome}</td>
        <td>${nota}</td>
        <td>${falta}</td>
      </tr>
    `;
  }

  html += "</table>";

  return html;
}

carregarDados();

</script>

</body>
</html>
