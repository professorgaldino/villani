<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 13</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    padding:15px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.topo{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

select{
    padding:8px;
    border-radius:6px;
}

/* CARD */
.aluno{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:20px;
    display:flex;
    gap:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto{
    width:90px;
    height:90px;
    border-radius:10px;
    object-fit:cover;
    border:2px solid #ddd;
}

.sem-foto{
    width:90px;
    height:90px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
    color:red;
    border-radius:10px;
}

/* INFO */
.info{
    flex:1;
    font-size:14px;
}

/* TABELA */
table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
    margin-top:10px;
}

th, td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th{
    background:#0077cc;
    color:white;
}

.subtopo{
    background:#005fa3;
    color:white;
    font-size:11px;
}

.vazio{
    background:#e8ddff;
}

/* ELETIVAS */
.eletiva-box{
    margin-top:6px;
    padding:8px;
    border-radius:8px;
    background:white;
    border:1px solid #ddd;
}

/* NÃO LANÇADO */
.nao-lancado{
    background:#fff3cd;
    color:#856404;
    font-size:11px;
}

</style>

</head>

<body>

<div class="container">

<div class="topo">

    <h2>📊 Boletim Completo</h2>

    <select id="salaSelect">
        <option value="6">6º Ano A</option>
        <option value="7">7º Ano A</option>
        <option value="8">8º Ano A</option>
    </select>

</div>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS =
"https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const BIMESTRES = {
    1: "apb",
    2: "asb",
    3: "atb",
    4: "aqb"
};

let serie = "6";

let alunos = [];
let dadosBimestres = {};

// FOTO
function montarFoto(id){

    if(!id) return null;

    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

// NORMALIZAR
function normalizar(t){

    return (t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// VALOR
function v(x){

    return (
        x === null ||
        x === undefined ||
        x === ""
    ) ? "-" : x;
}

// CARREGAR ALUNOS
async function carregarAlunos(){

    const res = await fetch(URL_ALUNOS);

    alunos = await res.json();
}

// CARREGAR BIMESTRE
async function carregarBimestre(n){

    try{

        const arquivo = `${serie}${BIMESTRES[n]}.json`;

        const res = await fetch(arquivo);

        if(!res.ok){
            throw new Error();
        }

        return await res.json();

    }catch(e){

        return null;
    }
}

// CARREGAR
async function carregar(){

    await carregarAlunos();

    dadosBimestres = {};

    for(let i = 1; i <= 4; i++){

        dadosBimestres[i] =
            await carregarBimestre(i);
    }

    montar();
}

// ELETIVAS
function montarEletivas(alunoBase){

    const e1 = alunoBase?.eletiva1 || "";
    const e2 = alunoBase?.eletiva2 || "";

    return `
    <div class="eletiva-box">

        <strong>📘 Eletivas</strong><br><br>

        Eletiva 1° Semestre:
        ${e1 ? e1 : "Sem eletiva"}<br>

        Eletiva 2° Semestre:
        ${e2 ? e2 : "Sem eletiva"}

    </div>
    `;
}

// PEGAR DADOS BIMESTRE
function pegarAlunoBimestre(nomeAluno, n){

    const dados = dadosBimestres[n];

    if(!dados) return null;

    return Object.values(dados)
        .find(a =>
            normalizar(a.nome) ===
            normalizar(nomeAluno)
        );
}

// MONTAR TABELA ÚNICA
function montarTabelaUnica(nomeAluno){

    // DISCIPLINAS BASE
    const alunoBase = pegarAlunoBimestre(nomeAluno, 1);

    if(!alunoBase){

        return `
        <div class="nao-lancado">
            Nenhum boletim encontrado
        </div>
        `;
    }

    let html = `
    <table>

        <tr>

            <th rowspan="2">
                Disciplina
            </th>

            <th colspan="3">
                📘 1° Bimestre
            </th>

            <th colspan="3">
                📘 2° Bimestre
            </th>

            <th colspan="3">
                📘 3° Bimestre
            </th>

            <th colspan="3">
                📘 4° Bimestre
            </th>

        </tr>

        <tr class="subtopo">

            <th>Média</th>
            <th>Faltas</th>
            <th>F.AC</th>

            <th>Média</th>
            <th>Faltas</th>
            <th>F.AC</th>

            <th>Média</th>
            <th>Faltas</th>
            <th>F.AC</th>

            <th>Média</th>
            <th>Faltas</th>
            <th>F.AC</th>

        </tr>
    `;

    // PEGA DISCIPLINAS FIXAS
    for(let disciplina in alunoBase.disciplinas){

        html += `<tr>`;

        html += `<td>${disciplina}</td>`;

        // 4 BIMESTRES
        for(let b = 1; b <= 4; b++){

            const aluno = pegarAlunoBimestre(nomeAluno, b);

            // BIMESTRE NÃO LANÇADO
            if(!dadosBimestres[b]){

                html += `
                <td colspan="3" class="nao-lancado">
                    Não lançado
                </td>
                `;

                continue;
            }

            // ALUNO NÃO EXISTE
            if(!aluno){

                html += `
                <td colspan="3" class="nao-lancado">
                    Sem dados
                </td>
                `;

                continue;
            }

            const d =
                aluno.disciplinas[disciplina];

            if(!d){

                html += `
                <td colspan="3" class="nao-lancado">
                    Sem disciplina
                </td>
                `;

                continue;
            }

            const media = v(d.numero);
            const faltas = v(d.media);
            const acum = v(d.faltas);

            html += `
            <td class="${media==='-'?'vazio':''}">
                ${media}
            </td>

            <td class="${faltas==='-'?'vazio':''}">
                ${faltas}
            </td>

            <td>
                ${acum}
            </td>
            `;
        }

        html += `</tr>`;
    }

    html += `</table>`;

    // RESUMOS DOS BIMESTRES
    for(let b = 1; b <= 4; b++){

        const aluno = pegarAlunoBimestre(nomeAluno, b);

        html += `<br>`;

        html += `<strong>📘 ${b}° Bimestre</strong><br>`;

        if(!dadosBimestres[b]){

            html += `
            <span class="nao-lancado">
                Bimestre não lançado
            </span>
            `;

            continue;
        }

        if(!aluno){

            html += `
            <span class="nao-lancado">
                Sem dados do aluno
            </span>
            `;

            continue;
        }

        html += `
        📌 Faltas acumuladas:
        ${v(aluno.totais?.faltas_acumuladas)}<br>

        📊 Frequência:
        ${v(aluno.totais?.frequencia)}%<br>

        📌 Faltas anual:
        ${v(aluno.totais?.faltas_anual)}<br>

        📊 Frequência anual:
        ${v(aluno.totais?.frequencia_anual)}%
        `;
    }

    return html;
}

// MONTAR
function montar(){

    const box =
        document.getElementById("boletim");

    box.innerHTML = "";

    const mapaAlunos = {};

    alunos.forEach(a => {

        mapaAlunos[
            normalizar(a.nome)
        ] = a;
    });

    // BASE
    const base = dadosBimestres[1];

    if(!base){

        box.innerHTML = `
        <div class="nao-lancado">
            Nenhum boletim encontrado
        </div>
        `;

        return;
    }

    Object.values(base).forEach(a => {

        const alunoBase =
            mapaAlunos[normalizar(a.nome)];

        const foto = alunoBase
            ? montarFoto(alunoBase.foto)
            : null;

        const fotoHTML = foto
            ? `<img class="foto" src="${foto}">`
            : `<div class="sem-foto">❌</div>`;

        box.innerHTML += `
        <div class="aluno">

            ${fotoHTML}

            <div class="info">

                <strong>${a.nome}</strong><br>

                RA:
                ${alunoBase?.ra || "-"}<br>

                Tutor:
                ${alunoBase?.tutor || "-"}<br>

                ${montarEletivas(alunoBase)}

                <br>

                ${montarTabelaUnica(a.nome)}

            </div>

        </div>
        `;
    });
}

// TROCAR SÉRIE
document.getElementById("salaSelect")
.addEventListener("change", e => {

    serie = e.target.value;

    carregar();
});

// INICIAR
carregar();

</script>

</body>
</html>
