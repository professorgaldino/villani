<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
    align-items: center;
}

select {
    padding: 8px;
    border-radius: 6px;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    border-radius: 10px;
}

.info {
    flex: 1;
    font-size: 14px;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

th {
    background: #0077cc;
    color: white;
}

.vazio {
    background: #e8ddff;
}

/* ELETIVAS */
.eletiva-box {
    margin-top: 6px;
    padding: 8px;
    border-radius: 8px;
    background: white;
    border: 1px solid #ddd;
}

/* BIMESTRE */
.bimestre-box {
    margin-top: 12px;
    padding: 8px;
    border-radius: 8px;
    background: #f9f9f9;
    border: 1px solid #ddd;
}

.bimestre-titulo {
    font-weight: bold;
    margin-bottom: 5px;
    color: #0077cc;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">

    <h2>📊 Boletim Completo</h2>

    <select id="salaSelect">
        <option value="6">6º Ano A</option>
        <option value="7">7º Ano A</option>
        <option value="8">8º Ano A</option>
    </select>

</div>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS =
"https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const BIMESTRES = {
    1: "apb",
    2: "asb",
    3: "atb",
    4: "aqb"
};

let serie = "6";

let alunos = [];
let dadosBimestres = {};

// FOTO
function montarFoto(id) {

    if (!id) return null;

    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

// NORMALIZAR
function normalizar(t) {

    return (t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// VALOR
function v(x) {

    return (
        x === null ||
        x === undefined ||
        x === ""
    ) ? "-" : x;
}

// CARREGAR ALUNOS
async function carregarAlunos() {

    const res = await fetch(URL_ALUNOS);

    alunos = await res.json();
}

// CARREGAR BIMESTRE
async function carregarBimestre(n) {

    try {

        const res = await fetch(`${serie}${BIMESTRES[n]}.json`);

        if (!res.ok) throw new Error();

        return await res.json();

    } catch {

        return null;
    }
}

// CARREGAR TUDO
async function carregar() {

    await carregarAlunos();

    dadosBimestres = {};

    for (let i = 1; i <= 4; i++) {

        dadosBimestres[i] = await carregarBimestre(i);
    }

    montar();
}

// ELETIVAS
function montarEletivas(alunoBase) {

    const e1 = alunoBase?.eletiva1;
    const e2 = alunoBase?.eletiva2;

    return `
    <div class="eletiva-box">

        <strong>📘 Eletivas</strong><br>

        Eletiva 1° Semestre:
        ${e1 ? e1 : "Sem eletiva"}<br>

        Eletiva 2° Semestre:
        ${e2 ? e2 : "Sem eletiva"}

    </div>
    `;
}

// MONTAR BIMESTRE
function montarBimestre(alunoNome, bimestreData, titulo) {

    if (!bimestreData) {
        return "";
    }

    const aluno = Object.values(bimestreData)
        .find(a => normalizar(a.nome) === normalizar(alunoNome));

    if (!aluno) {
        return "";
    }

    let temDados = false;

    let html = `
    <div class="bimestre-box">

        <div class="bimestre-titulo">
            ${titulo}
        </div>

        <table>

        <tr>
            <th>Disciplina</th>
            <th>Média</th>
            <th>Faltas</th>
            <th>Faltas AC</th>
        </tr>
    `;

    for (let d in aluno.disciplinas) {

        const x = aluno.disciplinas[d];

        const media = v(x.numero);
        const faltas = v(x.media);
        const acum = v(x.faltas);

        if (
            media !== "-" ||
            faltas !== "-" ||
            acum !== "-"
        ) {
            temDados = true;
        }

        html += `
        <tr>

            <td>${d}</td>

            <td class="${media === '-' ? 'vazio' : ''}">
                ${media}
            </td>

            <td class="${faltas === '-' ? 'vazio' : ''}">
                ${faltas}
            </td>

            <td class="${acum === '-' ? 'vazio' : ''}">
                ${acum}
            </td>

        </tr>
        `;
    }

    html += `
        </table>
    </div>
    `;

    return temDados ? html : "";
}

// MONTAR
function montar() {

    const box = document.getElementById("boletim");

    box.innerHTML = "";

    const mapaAlunos = {};

    alunos.forEach(a => {

        mapaAlunos[normalizar(a.nome)] = a;
    });

    const baseLista = dadosBimestres[1]
        ? Object.values(dadosBimestres[1])
        : [];

    baseLista.forEach(a => {

        const alunoBase =
            mapaAlunos[normalizar(a.nome)];

        const foto =
            alunoBase
                ? montarFoto(alunoBase.foto)
                : null;

        const fotoHTML = foto
            ? `<img class="foto" src="${foto}">`
            : `<div class="sem-foto">❌</div>`;

        box.innerHTML += `
        <div class="aluno">

            ${fotoHTML}

            <div class="info">

                <strong>${a.nome}</strong><br>

                RA:
                ${alunoBase?.ra || "-"}<br>

                Tutor:
                ${alunoBase?.tutor || "-"}<br>

                ${montarEletivas(alunoBase)}

                <hr>

                ${montarBimestre(
                    a.nome,
                    dadosBimestres[1],
                    "📘 1º Bimestre"
                )}

                ${montarBimestre(
                    a.nome,
                    dadosBimestres[2],
                    "📘 2º Bimestre"
                )}

                ${montarBimestre(
                    a.nome,
                    dadosBimestres[3],
                    "📘 3º Bimestre"
                )}

                ${montarBimestre(
                    a.nome,
                    dadosBimestres[4],
                    "📘 4º Bimestre"
                )}

                <br>

                📌 Faltas acumuladas:
                ${v(a.totais?.faltas_acumuladas)}<br>

                📊 Frequência:
                ${v(a.totais?.frequencia)}%<br>

                📌 Faltas anual:
                ${v(a.totais?.faltas_anual)}<br>

                📊 Frequência anual:
                ${v(a.totais?.frequencia_anual)}%

            </div>

        </div>
        `;
    });
}

// TROCA SÉRIE
document
.getElementById("salaSelect")
.addEventListener("change", e => {

    serie = e.target.value;

    carregar();
});

carregar();

</script>

</body>
</html>
