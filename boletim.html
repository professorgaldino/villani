<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 7</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    border-radius: 10px;
}

.info {
    flex: 1;
    font-size: 14px;
}

.disciplina {
    margin-top: 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid #eee;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim Escolar</h2>

    <select id="salaSelect">
        <option value="6apb.json">6º Ano A</option>
        <option value="7apb.json">7º Ano A</option>
        <option value="8apb.json">8º Ano A</option>
    </select>
</div>

<div id="boletim"></div>

</div>

<script>

let URL_NOTAS = "6apb.json";
let notas = {};

// FOTO
function montarFoto(id) {
    if (!id) return null;
    return "https://lh3.googleusercontent.com/d/" + id;
}

// VALOR
function v(x) {
    return (x === null || x === undefined) ? "-" : x;
}

// CARREGAR
async function carregar() {
    const res = await fetch(URL_NOTAS);
    notas = await res.json();
    montar();
}

// PRINCIPAL
function montar() {

    const box = document.getElementById("boletim");
    box.innerHTML = "";

    const alunos = Object.values(notas);

    alunos.forEach(a => {

        const foto = montarFoto(a.foto);

        const fotoHTML = foto
            ? `<img class="foto" src="${foto}">`
            : `<div class="sem-foto">❌</div>`;

        let disciplinasHTML = "";

        for (let nome in a.disciplinas) {
            let d = a.disciplinas[nome];

            disciplinasHTML += `
                <div class="disciplina">
                    <strong>${nome}</strong><br>
                    Média: ${v(d.numero)} |
                    Faltas: ${v(d.media)} |
                    Faltas Acum.: ${v(d.faltas)}
                </div>
            `;
        }

        box.innerHTML += `
        <div class="aluno">

            ${fotoHTML}

            <div class="info">

                <strong>${a.nome}</strong><br>

                RA (Chamada): ${v(a.numero)}<br>
                Situação: ${v(a.situacao)}<br>

                ${disciplinasHTML}

                <hr>

                📌 Faltas acumuladas: ${v(a.totais?.faltas_acumuladas)}<br>
                📊 Frequência: ${v(a.totais?.frequencia)}%<br>
                📌 Faltas anual: ${v(a.totais?.faltas_anual)}<br>
                📊 Frequência anual: ${v(a.totais?.frequencia_anual)}%
            </div>

        </div>
        `;
    });
}

// TROCA DE SALA
document.getElementById("salaSelect").addEventListener("change", e => {
    URL_NOTAS = e.target.value;
    carregar();
});

carregar();

</script>

</body>
</html>
