<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Unificado Correto</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    padding: 15px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

select {
    padding: 8px;
    border-radius: 6px;
}

/* CARD */
.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    display: flex;
    gap: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* FOTO */
.foto {
    width: 90px;
    height: 90px;
    border-radius: 10px;
    object-fit: cover;
    border: 2px solid #ddd;
}

.sem-foto {
    width: 90px;
    height: 90px;
    background: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
    color: red;
    border-radius: 10px;
}

/* INFO */
.info {
    flex: 1;
    font-size: 14px;
}

/* TABELA */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
}

th {
    background: #0077cc;
    color: white;
}

.vazio {
    background: #e8ddff;
}
</style>

</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim Unificado</h2>

    <select id="salaSelect">
        <option value="6apb.json">6º Ano A</option>
        <option value="7apb.json">7º Ano A</option>
        <option value="8apb.json">8º Ano A</option>
    </select>
</div>

<div id="boletim"></div>

</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

let URL_NOTAS = "6apb.json";

let alunos = [];
let notasAtual = {};

// 📸 FOTO
function montarFoto(id) {
    if (!id) return null;
    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

// 🔢 VALOR
function v(x) {
    return (x === null || x === undefined) ? "-" : x;
}

// 📥 CARREGAR
async function carregar() {

    const resAlunos = await fetch(URL_ALUNOS);
    alunos = await resAlunos.json();

    const resNotas = await fetch(URL_NOTAS);
    notasAtual = await resNotas.json();

    montar();
}

// 📊 MERGE CORRETO (SEM QUEBRAR)
function montar() {

    const box = document.getElementById("boletim");
    box.innerHTML = "";

    const mapaAlunos = {};
    alunos.forEach(a => {
        mapaAlunos[a.nome] = a;
    });

    const lista = Object.values(notasAtual);

    lista.forEach(a => {

        const alunoBase = mapaAlunos[a.nome];

        const foto = alunoBase ? montarFoto(alunoBase.foto) : null;

        const fotoHTML = foto
            ? `<img class="foto" src="${foto}">`
            : `<div class="sem-foto">❌</div>`;

        let disciplinasHTML = "";

        for (let nome in a.disciplinas) {

            const d = a.disciplinas[nome];

            const media = v(d.numero);
            const faltas = v(d.media);
            const acum = v(d.faltas);

            disciplinasHTML += `
            <tr>
                <td>${nome}</td>
                <td class="${media==='-'?'vazio':''}">${media}</td>
                <td class="${faltas==='-'?'vazio':''}">${faltas}</td>
                <td>${acum}</td>
            </tr>
            `;
        }

        box.innerHTML += `
        <div class="aluno">

            ${fotoHTML}

            <div class="info">

                <strong>${a.nome}</strong><br>
                RA: ${v(a.numero)}<br>
                Situação: ${v(a.situacao)}<br>

                <table>
                    <tr>
                        <th>Disciplina</th>
                        <th>Média</th>
                        <th>Faltas</th>
                        <th>Acum.</th>
                    </tr>

                    ${disciplinasHTML}
                </table>

                <br>

                📌 Faltas acumuladas: ${v(a.totais?.faltas_acumuladas)}<br>
                📊 Frequência: ${v(a.totais?.frequencia)}%<br>
                📌 Faltas anual: ${v(a.totais?.faltas_anual)}<br>
                📊 Frequência anual: ${v(a.totais?.frequencia_anual)}%
            </div>

        </div>
        `;
    });
}

// 🔁 SALA
document.getElementById("salaSelect").addEventListener("change", e => {
    URL_NOTAS = e.target.value;
    carregar();
});

carregar();

</script>

</body>
</html>
