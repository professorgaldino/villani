<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Boletim Escolar 3 - DEBUG</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f8;
    padding:15px;
}

.container{
    max-width:1600px;
    margin:auto;
}

.topo{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
}

select, button{
    padding:8px;
    border-radius:6px;
}

.navegacao-alunos{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:20px;
}

.btn-aluno{
    width:42px;
    height:42px;
    border:none;
    border-radius:8px;
    background:#0077cc;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn-aluno.ativo{
    background:#28a745;
}

.aluno{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:20px;
    display:flex;
    gap:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.foto{
    width:90px;
    height:90px;
    border-radius:10px;
    object-fit:cover;
    border:2px solid #ddd;
}

.sem-foto{
    width:90px;
    height:90px;
    background:#eee;
    display:flex;
    align-items:center;
    justify-content:center;
    color:red;
    border-radius:10px;
}

.info{
    flex:1;
    font-size:14px;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:12px;
    margin-top:10px;
}

th, td{
    border:1px solid #ddd;
    padding:6px;
    text-align:center;
}

th{
    background:#0077cc;
    color:white;
}

.subtopo{
    background:#005fa3;
    color:white;
    font-size:11px;
}

.vazio{
    background:#e8ddff;
}

.eletiva-box,
.ocorrencias-box{
    margin-top:10px;
    padding:10px;
    border-radius:8px;
    background:#fafafa;
    border:1px solid #ddd;
}

.nao-lancado{
    background:#fff3cd;
    color:#856404;
    font-size:11px;
    font-weight:bold;
    padding:6px;
    border-radius:6px;
    display:inline-block;
}

.baixa-nota{
    color:red;
    font-weight:bold;
}

.alerta-frequencia{
    color:red;
    font-weight:bold;
    margin-top:5px;
    display:inline-block;
}

.ocorrencia-item{
    border:1px solid #ddd;
    background:white;
    border-radius:8px;
    padding:8px;
    margin-bottom:8px;
}

.ocorrencia-meta{
    font-size:12px;
    color:#555;
    margin-bottom:4px;
    line-height:1.5;
}

.ocorrencia-descricao{
    font-size:13px;
    margin-top:6px;
    margin-bottom:6px;
    line-height:1.5;
}

/* DEBUG */
.debug-box{
    background:#111827;
    color:#e5e7eb;
    padding:12px;
    border-radius:10px;
    margin-bottom:20px;
    font-size:12px;
}

.debug-box h3{
    margin:0 0 10px 0;
    color:white;
}

.debug-item{
    border:1px solid #374151;
    border-radius:8px;
    margin-top:10px;
    overflow:hidden;
}

.debug-title{
    background:#1f2937;
    padding:8px;
    cursor:pointer;
    font-weight:bold;
}

.debug-content{
    display:none;
    padding:8px;
    background:#030712;
    max-height:360px;
    overflow:auto;
    white-space:pre-wrap;
    word-break:break-word;
}

.debug-ok{
    color:#86efac;
}

.debug-erro{
    color:#fca5a5;
}

.debug-warn{
    color:#fde68a;
}
</style>
</head>

<body>

<div class="container">

<div class="topo">
    <h2>📊 Boletim Completo - DEBUG</h2>

    <select id="salaSelect">
        <option value="6">6º Ano A</option>
        <option value="7">7º Ano A</option>
        <option value="8">8º Ano A</option>
    </select>
</div>

<div class="debug-box">
    <h3>🔎 Painel Debug</h3>
    <button onclick="alternarDebugTudo()">Abrir / fechar todos os JSONs</button>
    <button onclick="carregar()">Recarregar tudo</button>
    <div id="debugConteudo"></div>
</div>

<div id="navegacaoAlunos" class="navegacao-alunos"></div>

<div id="boletim"></div>

</div>

<script>
const URL_ALUNOS =
"https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const URL_OCORRENCIAS =
"https://script.google.com/macros/s/AKfycbxumXT10my5xZQL0_BeeC3NRtDCFSK1-dWYMk3qLQEuPDqDkAoGvLZjvZ4S7t6r9trj/exec";

const BIMESTRES = {
    1: "apb",
    2: "asb",
    3: "atb",
    4: "aqb"
};

let serie = "6";
let alunos = [];
let ocorrencias = [];
let ocorrenciasCarregadas = false;
let dadosBimestres = {};
let indiceAtual = 0;
let debugAberto = false;
let debugRegistros = [];

function normalizar(t){
    return String(t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

function normalizarRA(ra){
    return String(ra || "")
        .replace(/\D/g, "")
        .replace(/^0+/, "");
}

function escaparHTML(valor){
    return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function v(x){
    return (
        x === null ||
        x === undefined ||
        x === ""
    ) ? "-" : x;
}

function numero(valor){
    return Number(String(valor).replace(",", "."));
}

function classeNota(valor){
    const n = numero(valor);
    return !isNaN(n) && n < 5 ? "baixa-nota" : "";
}

function classeFrequencia(valor){
    const n = numero(valor);
    return !isNaN(n) && n < 75 ? "baixa-nota" : "";
}

function montarFoto(id){
    if(!id) return null;
    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

function adicionarDebug(titulo, url, status, dados, erro){
    debugRegistros.push({
        titulo,
        url,
        status,
        dados,
        erro
    });

    renderDebug();
}

function renderDebug(){
    const box = document.getElementById("debugConteudo");

    box.innerHTML = debugRegistros.map((item, index) => {
        const classe = item.erro
            ? "debug-erro"
            : item.status >= 200 && item.status < 300
                ? "debug-ok"
                : "debug-warn";

        const conteudo = {
            titulo: item.titulo,
            url: item.url,
            status: item.status,
            erro: item.erro ? String(item.erro) : null,
            dados: item.dados
        };

        return `
        <div class="debug-item">
            <div class="debug-title ${classe}" onclick="alternarDebug(${index})">
                ${escaparHTML(item.titulo)} | Status: ${escaparHTML(item.status || "-")}
            </div>
            <div class="debug-content" id="debug-${index}">
${escaparHTML(JSON.stringify(conteudo, null, 2))}
            </div>
        </div>
        `;
    }).join("");
}

function alternarDebug(index){
    const el = document.getElementById("debug-" + index);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

function alternarDebugTudo(){
    debugAberto = !debugAberto;

    document.querySelectorAll(".debug-content").forEach(el => {
        el.style.display = debugAberto ? "block" : "none";
    });
}

async function buscarDebug(titulo, url){
    try{
        const res = await fetch(url);
        const texto = await res.text();

        let json = null;
        let erroJson = null;

        try{
            json = JSON.parse(texto);
        }catch(e){
            erroJson = "Resposta não é JSON válido. Primeiros caracteres: " + texto.slice(0, 300);
        }

        adicionarDebug(
            titulo,
            url,
            res.status,
            json || texto,
            erroJson
        );

        if(erroJson){
            return null;
        }

        return json;

    }catch(e){
        adicionarDebug(
            titulo,
            url,
            "FALHA",
            null,
            e.message
        );

        return null;
    }
}

function extrairListaOcorrencias(json){
    if(!json) return [];

    if(Array.isArray(json)){
        return json;
    }

    const chavesPossiveis = [
        "ocorrencias",
        "ocorrências",
        "dados",
        "data",
        "registros",
        "lista",
        "items",
        "result",
        "results"
    ];

    for(const chave of chavesPossiveis){
        if(Array.isArray(json[chave])){
            return json[chave];
        }
    }

    for(const chave in json){
        if(Array.isArray(json[chave])){
            return json[chave];
        }
    }

    return [];
}

async function carregarAlunos(){
    const json = await buscarDebug("URL_ALUNOS", URL_ALUNOS);
    alunos = Array.isArray(json) ? json : [];
}

async function carregarOcorrencias(){
    ocorrencias = [];
    ocorrenciasCarregadas = false;

    const json = await buscarDebug("URL_OCORRENCIAS", URL_OCORRENCIAS);

    ocorrencias = extrairListaOcorrencias(json);
    ocorrenciasCarregadas = true;

    adicionarDebug(
        "OCORRENCIAS_EXTRAIDAS",
        "extraido de URL_OCORRENCIAS",
        "OK",
        {
            quantidade: ocorrencias.length,
            primeiraOcorrencia: ocorrencias[0] || null,
            colunasPrimeiraOcorrencia: ocorrencias[0] ? Object.keys(ocorrencias[0]) : []
        },
        null
    );
}

async function carregarBimestre(n){
    const arquivo = `${serie}${BIMESTRES[n]}.json`;
    const json = await buscarDebug(`BIMESTRE_${n} | ${arquivo}`, arquivo);

    if(!json){
        return null;
    }

    return json;
}

function pegarBaseAlunos(){
    for(let b = 1; b <= 4; b++){
        if(dadosBimestres[b]){
            return Object.values(dadosBimestres[b]);
        }
    }

    return [];
}

function pegarAlunoBimestre(nomeAluno, n){
    const dados = dadosBimestres[n];

    if(!dados) return null;

    return Object.values(dados)
        .find(a => normalizar(a.nome) === normalizar(nomeAluno));
}

function pegarAlunoQualquerBimestre(nomeAluno){
    for(let b = 1; b <= 4; b++){
        const aluno = pegarAlunoBimestre(nomeAluno, b);

        if(aluno){
            return aluno;
        }
    }

    return null;
}

function pegarDisciplinasAluno(nomeAluno){
    const disciplinas = [];

    for(let b = 1; b <= 4; b++){
        const aluno = pegarAlunoBimestre(nomeAluno, b);

        if(!aluno || !aluno.disciplinas) continue;

        Object.keys(aluno.disciplinas).forEach(disciplina => {
            if(!disciplinas.includes(disciplina)){
                disciplinas.push(disciplina);
            }
        });
    }

    return disciplinas;
}

async function carregar(){
    const box = document.getElementById("boletim");
    const nav = document.getElementById("navegacaoAlunos");

    box.innerHTML = `<div class="nao-lancado">Carregando dados...</div>`;
    nav.innerHTML = "";

    debugRegistros = [];
    renderDebug();

    alunos = [];
    ocorrencias = [];
    ocorrenciasCarregadas = false;
    dadosBimestres = {};

    adicionarDebug(
        "CONFIGURACAO_ATUAL",
        "interno",
        "OK",
        {
            serie,
            URL_ALUNOS,
            URL_OCORRENCIAS,
            arquivosBimestres: [
                `${serie}apb.json`,
                `${serie}asb.json`,
                `${serie}atb.json`,
                `${serie}aqb.json`
            ]
        },
        null
    );

    await carregarAlunos();

    for(let i = 1; i <= 4; i++){
        dadosBimestres[i] = await carregarBimestre(i);
    }

    await carregarOcorrencias();

    adicionarDebug(
        "RESUMO_FINAL",
        "interno",
        "OK",
        {
            quantidadeAlunosURL: alunos.length,
            quantidadeOcorrencias: ocorrencias.length,
            bimestresCarregados: {
                1: !!dadosBimestres[1],
                2: !!dadosBimestres[2],
                3: !!dadosBimestres[3],
                4: !!dadosBimestres[4]
            },
            quantidadeBaseAlunos: pegarBaseAlunos().length
        },
        null
    );

    montarNavegacao();

    const base = pegarBaseAlunos();

    if(base.length === 0){
        box.innerHTML = `
        <div class="nao-lancado">
            Nenhum dado encontrado para esta sala.
        </div>
        `;
        return;
    }

    mostrarAluno(0);
}

function montarEletivas(alunoBase){
    const e1 = alunoBase?.eletiva1 || "";
    const e2 = alunoBase?.eletiva2 || "";

    return `
    <div class="eletiva-box">
        <strong>📘 Eletivas</strong><br><br>
        Eletiva 1° Semestre: ${escaparHTML(e1 ? e1 : "Sem eletiva")}<br>
        Eletiva 2° Semestre: ${escaparHTML(e2 ? e2 : "Sem eletiva")}
    </div>
    `;
}

function pegarOcorrenciasAluno(nomeAluno, raAluno){
    const nomeBoletim = normalizar(nomeAluno);
    const raBoletim = normalizarRA(raAluno);

    const comparacoes = [];

    const lista = ocorrencias.filter(item => {
        const nomeOcorrencia = normalizar(item.nome);
        const raOcorrencia = normalizarRA(item.ra);

        const bateRA =
            raBoletim &&
            raOcorrencia &&
            raBoletim === raOcorrencia;

        const bateNome =
            nomeBoletim &&
            nomeOcorrencia &&
            nomeBoletim === nomeOcorrencia;

        comparacoes.push({
            nomeBoletimOriginal: nomeAluno,
            nomeBoletimNormalizado: nomeBoletim,
            raBoletimOriginal: raAluno,
            raBoletimNormalizado: raBoletim,
            nomeOcorrenciaOriginal: item.nome,
            nomeOcorrenciaNormalizado: nomeOcorrencia,
            raOcorrenciaOriginal: item.ra,
            raOcorrenciaNormalizado: raOcorrencia,
            bateRA,
            bateNome,
            registro: item
        });

        return bateRA || bateNome;
    });

    adicionarDebug(
        "COMPARACAO_OCORRENCIAS_ALUNO_ATUAL",
        "interno",
        "OK",
        {
            aluno: nomeAluno,
            ra: raAluno,
            encontradas: lista.length,
            comparacoes
        },
        null
    );

    return lista;
}

function montarOcorrencias(nomeAluno, raAluno){
    let html = `
    <div class="ocorrencias-box">
        <h3>📌 Ocorrências</h3>
    `;

    if(!ocorrenciasCarregadas){
        html += `<span class="nao-lancado">Carregando ocorrências...</span></div>`;
        return html;
    }

    const lista = pegarOcorrenciasAluno(nomeAluno, raAluno);

    if(lista.length === 0){
        html += `<span class="nao-lancado">Nenhuma ocorrência encontrada</span></div>`;
        return html;
    }

    lista.forEach(item => {
        html += `
        <div class="ocorrencia-item">
            <div class="ocorrencia-meta">
                <strong>Registro:</strong>
                ${escaparHTML(v(item.dataRegistro))}
                ${item.horaRegistro ? " - " + escaparHTML(item.horaRegistro) : ""}
                <br>

                <strong>Data do fato:</strong>
                ${escaparHTML(v(item.dataFato))}
                <br>

                <strong>RA:</strong>
                ${escaparHTML(v(item.ra))}
                |
                <strong>Sala:</strong>
                ${escaparHTML(v(item.sala))}
                |
                <strong>Tutor:</strong>
                ${escaparHTML(v(item.tutor))}
                |
                <strong>Professor:</strong>
                ${escaparHTML(v(item.professor))}
            </div>

            <div class="ocorrencia-descricao">
                <strong>Descrição:</strong>
                ${escaparHTML(v(item.descricao))}
            </div>

            <div class="ocorrencia-meta">
                <strong>Ação:</strong>
                ${escaparHTML(v(item.acao))}
            </div>
        </div>
        `;
    });

    html += `</div>`;

    return html;
}

function montarTabelaUnica(nomeAluno){
    const alunoReferencia = pegarAlunoQualquerBimestre(nomeAluno);
    const disciplinas = pegarDisciplinasAluno(nomeAluno);

    if(!alunoReferencia || disciplinas.length === 0){
        return `<div class="nao-lancado">Nenhum boletim encontrado</div>`;
    }

    let html = `
    <table>
        <tr>
            <th rowspan="2">Disciplina</th>
            <th colspan="3">📘 1° Bimestre</th>
            <th colspan="3">📘 2° Bimestre</th>
            <th colspan="3">📘 3° Bimestre</th>
            <th colspan="3">📘 4° Bimestre</th>
        </tr>

        <tr class="subtopo">
            <th>Média</th><th>Faltas</th><th>F.AC</th>
            <th>Média</th><th>Faltas</th><th>F.AC</th>
            <th>Média</th><th>Faltas</th><th>F.AC</th>
            <th>Média</th><th>Faltas</th><th>F.AC</th>
        </tr>
    `;

    disciplinas.forEach(disciplina => {
        html += `<tr><td>${escaparHTML(disciplina)}</td>`;

        for(let b = 1; b <= 4; b++){
            const aluno = pegarAlunoBimestre(nomeAluno, b);

            if(!dadosBimestres[b]){
                html += `<td colspan="3" class="nao-lancado">Não lançado</td>`;
                continue;
            }

            if(!aluno){
                html += `<td colspan="3" class="nao-lancado">Sem dados</td>`;
                continue;
            }

            const d = aluno.disciplinas?.[disciplina];

            if(!d){
                html += `<td colspan="3" class="nao-lancado">Sem disciplina</td>`;
                continue;
            }

            const media = v(d.numero);
            const faltas = v(d.media);
            const acum = v(d.faltas);

            html += `
            <td class="${media === "-" ? "vazio" : ""} ${classeNota(media)}">${escaparHTML(media)}</td>
            <td class="${faltas === "-" ? "vazio" : ""}">${escaparHTML(faltas)}</td>
            <td>${escaparHTML(acum)}</td>
            `;
        }

        html += `</tr>`;
    });

    html += `</table>`;

    for(let b = 1; b <= 4; b++){
        const aluno = pegarAlunoBimestre(nomeAluno, b);

        html += `<br><strong>📘 ${b}° Bimestre</strong><br>`;

        if(!dadosBimestres[b]){
            html += `<span class="nao-lancado">Bimestre não lançado</span>`;
            continue;
        }

        if(!aluno){
            html += `<span class="nao-lancado">Sem dados do aluno</span>`;
            continue;
        }

        const freq = numero(aluno.totais?.frequencia);
        const freqAnual = numero(aluno.totais?.frequencia_anual);

        html += `
        📌 Faltas acumuladas:
        ${escaparHTML(v(aluno.totais?.faltas_acumuladas))}<br>

        <span class="${classeFrequencia(freq)}">
        📊 Frequência:
        ${escaparHTML(v(aluno.totais?.frequencia))}%
        </span><br>

        📌 Faltas anual:
        ${escaparHTML(v(aluno.totais?.faltas_anual))}<br>

        <span class="${classeFrequencia(freqAnual)}">
        📊 Frequência anual:
        ${escaparHTML(v(aluno.totais?.frequencia_anual))}%
        </span>
        `;

        if(freq < 75 || freqAnual < 75){
            html += `
            <br>
            <span class="alerta-frequencia">
                ⚠ Apresenta Muitas Faltas
            </span>
            `;
        }
    }

    return html;
}

function montarNavegacao(){
    const nav = document.getElementById("navegacaoAlunos");
    nav.innerHTML = "";

    const base = pegarBaseAlunos();

    base.forEach((a, index) => {
        nav.innerHTML += `
        <button
            class="btn-aluno ${index === 0 ? "ativo" : ""}"
            onclick="mostrarAluno(${index})">
            ${index + 1}
        </button>
        `;
    });
}

function mostrarAluno(index){
    indiceAtual = index;

    document.querySelectorAll(".btn-aluno").forEach((b,i) => {
        b.classList.toggle("ativo", i === index);
    });

    const box = document.getElementById("boletim");

    const mapaAlunos = {};

    alunos.forEach(a => {
        mapaAlunos[normalizar(a.nome)] = a;
    });

    const base = pegarBaseAlunos();
    const a = base[index];

    if(!a){
        box.innerHTML = `<div class="nao-lancado">Aluno não encontrado.</div>`;
        return;
    }

    const alunoBase = mapaAlunos[normalizar(a.nome)];
    const foto = alunoBase ? montarFoto(alunoBase.foto) : null;

    const fotoHTML = foto
        ? `<img class="foto" src="${foto}">`
        : `<div class="sem-foto">❌</div>`;

    const raAluno = alunoBase?.ra || a.ra || "";
    const tutorAluno = alunoBase?.tutor || a.tutor || "-";

    box.innerHTML = `
    <div class="aluno">
        ${fotoHTML}

        <div class="info">
            <strong>${escaparHTML(a.nome)}</strong><br>

            RA:
            ${escaparHTML(raAluno || "-")}<br>

            Tutor:
            ${escaparHTML(tutorAluno)}<br>

            Situação:
            <strong>${escaparHTML(a.situacao || "Não informada")}</strong><br>

            ${montarEletivas(alunoBase)}

            ${montarOcorrencias(a.nome, raAluno)}

            <br>

            ${montarTabelaUnica(a.nome)}
        </div>
    </div>
    `;
}

document.getElementById("salaSelect")
.addEventListener("change", e => {
    serie = e.target.value;
    carregar();
});

carregar();
</script>

</body>
</html>
