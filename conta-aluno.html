<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VillaniBank - Conta Acadêmica</title>

<style>
:root{
    --bg:#edf2f7;
    --surface:#ffffff;
    --surface-soft:#f8fafc;
    --border:#d9e2ec;
    --text:#172033;
    --muted:#64748b;
    --primary:#1d4ed8;
    --primary-dark:#172554;
    --success:#15803d;
    --danger:#b91c1c;
    --warning:#b45309;
    --shadow:0 18px 45px rgba(15,23,42,0.12);
    --radius:14px;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(29,78,216,0.14), transparent 34%),
        linear-gradient(180deg, #f8fafc 0%, var(--bg) 100%);
    color:var(--text);
    padding:18px;
}

.container{
    max-width:1220px;
    margin:auto;
}

.card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:18px;
    box-shadow:var(--shadow);
    margin-bottom:16px;
}

.login-card{
    max-width:480px;
    margin:42px auto;
}

.brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo{
    width:54px;
    height:54px;
    object-fit:cover;
    border-radius:14px;
    border:1px solid var(--border);
    background:white;
}

.logo-grande{
    width:72px;
    height:72px;
    object-fit:cover;
    border-radius:18px;
    border:1px solid var(--border);
    background:white;
}

.topo{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    background:white;
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:16px;
    box-shadow:var(--shadow);
}

h1,h2,h3{
    margin-top:0;
}

h2{
    margin-bottom:6px;
}

label{
    display:block;
    font-size:13px;
    font-weight:bold;
    margin:12px 0 6px;
}

input,
select{
    width:100%;
    padding:12px;
    border:1px solid var(--border);
    border-radius:10px;
    font-family:inherit;
    color:var(--text);
    background:white;
}

button{
    border:none;
    border-radius:10px;
    padding:11px 16px;
    font-weight:bold;
    cursor:pointer;
    font-family:inherit;
}

button:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.btn-primary{
    background:var(--primary);
    color:white;
}

.btn-soft{
    background:#e2e8f0;
    color:var(--text);
}

.btn-info{
    width:24px;
    height:24px;
    border-radius:50%;
    padding:0;
    background:#dbeafe;
    color:var(--primary);
    font-weight:bold;
}

.erro{
    display:none;
    margin-top:12px;
    background:#fee2e2;
    border:1px solid #fecaca;
    color:#991b1b;
    padding:10px;
    border-radius:10px;
    font-size:13px;
    font-weight:bold;
}

.oculto{
    display:none;
}

.aluno-resumo{
    display:flex;
    align-items:center;
    gap:16px;
    flex-wrap:wrap;
}

.foto{
    width:92px;
    height:92px;
    border-radius:18px;
    object-fit:cover;
    border:3px solid white;
    box-shadow:0 8px 20px rgba(15,23,42,0.16);
}

.sem-foto{
    width:92px;
    height:92px;
    background:#f1f5f9;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--danger);
    border-radius:18px;
    border:1px solid var(--border);
    font-size:26px;
}

.saldo-card{
    background:linear-gradient(135deg, #0f172a, #1d4ed8);
    color:white;
    border:none;
    position:relative;
    overflow:hidden;
}

.saldo-card:after{
    content:"";
    position:absolute;
    right:-80px;
    top:-80px;
    width:220px;
    height:220px;
    background:rgba(255,255,255,0.12);
    border-radius:50%;
}

.saldo-label{
    color:rgba(255,255,255,0.78);
    font-size:14px;
    margin-bottom:8px;
}

.saldo-valor{
    font-size:42px;
    font-weight:bold;
    margin-bottom:10px;
}

.saldo-status{
    display:inline-block;
    padding:7px 10px;
    border-radius:999px;
    background:rgba(255,255,255,0.16);
    font-weight:bold;
    font-size:13px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    gap:14px;
    margin-bottom:16px;
}

.indicador{
    background:var(--surface-soft);
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
}

.indicador-topo{
    display:flex;
    justify-content:space-between;
    gap:8px;
    align-items:center;
}

.indicador strong{
    display:block;
    font-size:22px;
    margin-top:6px;
}

table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    font-size:13px;
    margin-top:10px;
    background:white;
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
}

th,td{
    border-right:1px solid var(--border);
    border-bottom:1px solid var(--border);
    padding:8px;
    text-align:center;
}

tr:last-child td{
    border-bottom:none;
}

th:last-child,
td:last-child{
    border-right:none;
}

th{
    background:var(--primary);
    color:white;
}

.alta{
    color:var(--success);
    font-weight:bold;
}

.baixa{
    color:var(--danger);
    font-weight:bold;
}

.estavel{
    color:var(--warning);
    font-weight:bold;
}

.muted{
    color:var(--muted);
}

.loading{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(148,163,184,0.88);
    z-index:99999;
    align-items:center;
    justify-content:center;
    text-align:center;
    color:#0f172a;
    font-weight:bold;
    font-size:22px;
}

.loading-box{
    background:white;
    padding:26px 34px;
    border-radius:18px;
    box-shadow:0 30px 80px rgba(15,23,42,0.25);
}

.popup{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(15,23,42,0.72);
    z-index:9999;
    padding:22px;
}

.modal{
    background:white;
    width:95%;
    max-width:560px;
    margin:70px auto;
    border-radius:18px;
    padding:22px;
    box-shadow:0 30px 80px rgba(0,0,0,0.28);
}

.modal p{
    line-height:1.55;
}

@media(max-width:760px){
    body{
        padding:10px;
    }

    .grid{
        grid-template-columns:1fr;
    }

    .saldo-valor{
        font-size:31px;
    }

    .topo{
        align-items:flex-start;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }
}
</style>
</head>

<body>

<div id="loading" class="loading">
    <div class="loading-box">
        Carregando dados...
    </div>
</div>

<div id="popupInfo" class="popup" onclick="fecharInfo()">
    <div class="modal" onclick="event.stopPropagation()">
        <h2 id="infoTitulo"></h2>
        <p id="infoTexto"></p>
        <button class="btn-primary" onclick="fecharInfo()">Entendi</button>
    </div>
</div>

<div class="container">

<div id="loginTela" class="card login-card">
    <div class="brand">
        <img class="logo-grande" src="logoescola.jpeg" alt="Logo da escola">
        <div>
            <h2>VillaniBank</h2>
            <div class="muted">Conta acadêmica individual</div>
        </div>
    </div>

    <label>Sala</label>
    <select id="loginSala">
        <option value="6a">6º Ano A</option>
        <option value="6b">6º Ano B</option>
        <option value="6c">6º Ano C</option>
        <option value="7a">7º Ano A</option>
        <option value="7b">7º Ano B</option>
        <option value="7c">7º Ano C</option>
        <option value="8a">8º Ano A</option>
        <option value="8b">8º Ano B</option>
        <option value="8c">8º Ano C</option>
        <option value="9a">9º Ano A</option>
        <option value="9b">9º Ano B</option>
        <option value="9c">9º Ano C</option>
        <option value="1a">1º Ano A</option>
        <option value="1b">1º Ano B</option>
        <option value="1c">1º Ano C</option>
        <option value="1d">1º Ano D</option>
        <option value="2a">2º Ano A</option>
        <option value="2b">2º Ano B</option>
        <option value="3a">3º Ano A</option>
    </select>

    <label>RA</label>
    <input id="loginRA" type="text" placeholder="Digite seu RA">

    <label>Senha</label>
    <input id="loginSenha" type="password" placeholder="Exemplo: J07081997#">

    <div style="margin-top:16px;">
        <button id="btnEntrar" class="btn-primary" onclick="entrarAluno()">Entrar</button>
    </div>

    <div id="erroLogin" class="erro"></div>
</div>

<div id="contaTela" class="oculto">

    <div class="topo">
        <div class="brand">
            <img class="logo" src="logoescola.jpeg" alt="Logo da escola">
            <div>
                <h2>VillaniBank</h2>
                <div class="muted">Painel financeiro acadêmico</div>
            </div>
        </div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
            <select id="periodoConta" onchange="renderizarConta()">
                <option value="anual">Extrato Anual</option>
                <option value="1">1º Bimestre</option>
                <option value="2">2º Bimestre</option>
                <option value="3">3º Bimestre</option>
                <option value="4">4º Bimestre</option>
            </select>

            <button class="btn-soft" onclick="sair()">Sair</button>
        </div>
    </div>

    <div class="card">
        <div id="dadosAluno" class="aluno-resumo"></div>
    </div>

    <div id="conteudoConta"></div>

</div>

</div>

<script>
const URL_ALUNOS =
"https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const URL_OCORRENCIAS =
"https://script.google.com/macros/s/AKfycbxmGpGeUfRGOTZ0Geh6GP9DyCOmLsuQ1o9IjbGvt-QgiHizG3OolrVuM67ETmvu7VIB/exec";

const URL_VILLANIBANK = "villanibank.json";

const BIMESTRES = {
    1: "apb",
    2: "asb",
    3: "atb",
    4: "aqb"
};

const DESCONTO_POR_OCORRENCIA = 3;
const PERCENTUAL_FREQUENCIA = 0.10;

let alunosCadastro = [];
let ocorrencias = [];
let villaniBank = {};
let dadosBimestres = {};
let alunoLogado = null;
let alunoCadastroLogado = null;
let serieAtual = "6a";

const explicacoes = {
    tc:{
        titulo:"TC - Therezinha Coin",
        texto:"TC é a moeda acadêmica da conta. As notas viram saldo, os superávits aumentam a conta e os déficits reduzem o saldo."
    },
    superavit:{
        titulo:"Superávit",
        texto:"Superávit é uma valorização. Na conta acadêmica, representa ganho de TC por bom desempenho, participação, meta da sala ou nota alta."
    },
    deficit:{
        titulo:"Déficit",
        texto:"Déficit é uma perda ou desvalorização. Pode acontecer por notas baixas, ocorrências ou lançamentos gerais da sala."
    },
    ocorrencias:{
        titulo:"Ocorrências",
        texto:"Cada ocorrência registrada no boletim individual desconta 3 TC da conta do aluno. A tabela mostra a quantidade e as datas."
    },
    frequencia:{
        titulo:"Frequência Anual",
        texto:"A frequência anual também afeta a conta. Abaixo de 80% gera desvalorização de 10%. Com 90% ou mais, gera valorização de 10%."
    },
    saldo:{
        titulo:"Saldo Acadêmico",
        texto:"É o resultado final da conta: notas convertidas em TC, mais superávits, menos déficits, menos ocorrências e mais ou menos o fator da frequência anual."
    }
};

function mostrarCarregando(ativo){
    document.getElementById("loading").style.display = ativo ? "flex" : "none";
    document.getElementById("btnEntrar").disabled = ativo;
}

function abrirInfo(chave){
    document.getElementById("infoTitulo").innerHTML = explicacoes[chave].titulo;
    document.getElementById("infoTexto").innerHTML = explicacoes[chave].texto;
    document.getElementById("popupInfo").style.display = "block";
}

function fecharInfo(){
    document.getElementById("popupInfo").style.display = "none";
}

function normalizar(t){
    return String(t || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

function normalizarRA(ra){
    return String(ra || "")
        .replace(/\D/g, "")
        .replace(/^0+/, "");
}

function escaparHTML(valor){
    return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function numero(valor){
    return Number(String(valor).replace(",", "."));
}

function formatarTC(valor){
    return `${Number(valor || 0).toFixed(1).replace(".", ",")} TC`;
}

function pegarCampo(obj, nomes){
    if(!obj) return "";

    const mapa = {};

    Object.keys(obj).forEach(chave => {
        mapa[normalizar(chave)] = obj[chave];
    });

    for(const nome of nomes){
        const valor = mapa[normalizar(nome)];

        if(valor !== undefined && valor !== null && valor !== ""){
            return valor;
        }
    }

    return "";
}

function montarFoto(id){
    if(!id) return null;
    return "https://lh3.googleusercontent.com/d/" + String(id).trim();
}

function formatarDataBR(valor){
    if(!valor) return "-";

    if(typeof valor === "string" && valor.includes("/") && !valor.includes("T")){
        return valor;
    }

    const data = new Date(valor);

    if(isNaN(data.getTime())){
        return String(valor);
    }

    return data.toLocaleDateString("pt-BR", {
        timeZone:"America/Sao_Paulo"
    });
}

function dataSenha(valor){
    if(!valor) return "";

    if(typeof valor === "string"){
        const apenasNumeros = valor.replace(/\D/g, "");

        if(apenasNumeros.length === 8){
            return apenasNumeros;
        }

        if(valor.includes("T")){
            const data = new Date(valor);

            if(!isNaN(data.getTime())){
                const dia = String(data.getUTCDate()).padStart(2, "0");
                const mes = String(data.getUTCMonth() + 1).padStart(2, "0");
                const ano = data.getUTCFullYear();

                return `${dia}${mes}${ano}`;
            }
        }
    }

    const data = new Date(valor);

    if(!isNaN(data.getTime())){
        const dia = String(data.getUTCDate()).padStart(2, "0");
        const mes = String(data.getUTCMonth() + 1).padStart(2, "0");
        const ano = data.getUTCFullYear();

        return `${dia}${mes}${ano}`;
    }

    return "";
}

function gerarSenhaAluno(aluno){
    const nome = pegarCampo(aluno, ["nome", "Nome", "Nome do Aluno"]);
    const nascimento = pegarCampo(aluno, [
        "dataNascimento",
        "Data de Nascimento",
        "nascimento",
        "Nascimento",
        "data_nascimento"
    ]);

    const primeiraLetra = String(nome || "").trim().charAt(0).toUpperCase();
    const data = dataSenha(nascimento);

    return `${primeiraLetra}${data}#`;
}

async function carregarCadastroAlunos(){
    if(alunosCadastro.length > 0) return;

    const res = await fetch(URL_ALUNOS);

    if(!res.ok){
        throw new Error("Erro ao carregar cadastro de alunos.");
    }

    alunosCadastro = await res.json();
}

function extrairListaOcorrencias(json){
    if(!json) return [];

    if(Array.isArray(json)){
        return json;
    }

    const chavesPossiveis = [
        "ocorrencias",
        "ocorrências",
        "dados",
        "data",
        "registros",
        "lista",
        "items",
        "result",
        "results"
    ];

    for(const chave of chavesPossiveis){
        if(Array.isArray(json[chave])){
            return json[chave];
        }
    }

    for(const chave in json){
        if(Array.isArray(json[chave])){
            return json[chave];
        }
    }

    return [];
}

async function carregarOcorrencias(){
    try{
        const res = await fetch(URL_OCORRENCIAS);

        if(!res.ok){
            throw new Error("Erro ao carregar ocorrências.");
        }

        const json = await res.json();
        ocorrencias = extrairListaOcorrencias(json);

    }catch(e){
        ocorrencias = [];
    }
}

async function carregarVillaniBank(){
    try{
        const res = await fetch(URL_VILLANIBANK + "?v=" + Date.now());

        if(!res.ok){
            throw new Error("Arquivo villanibank.json não encontrado.");
        }

        villaniBank = await res.json();

    }catch(e){
        villaniBank = {};
    }
}

async function carregarBimestre(serie, n){
    try{
        const arquivo = `${serie}${BIMESTRES[n]}.json`;
        const res = await fetch(arquivo);

        if(!res.ok){
            throw new Error("Arquivo não encontrado.");
        }

        return await res.json();

    }catch(e){
        return null;
    }
}

async function carregarDadosSala(serie){
    dadosBimestres = {};

    for(let i = 1; i <= 4; i++){
        dadosBimestres[i] = await carregarBimestre(serie, i);
    }
}

function pegarBaseAlunos(){
    for(let b = 1; b <= 4; b++){
        if(dadosBimestres[b]){
            return Object.values(dadosBimestres[b]);
        }
    }

    return [];
}

function pegarAlunoBimestre(nomeAluno, bimestre){
    const dados = dadosBimestres[bimestre];

    if(!dados) return null;

    return Object.values(dados).find(a =>
        normalizar(a.nome) === normalizar(nomeAluno)
    );
}

function encontrarCadastroPorRA(ra){
    const raBusca = normalizarRA(ra);

    return alunosCadastro.find(a => {
        const raAluno = normalizarRA(pegarCampo(a, ["ra", "RA"]));
        return raAluno && raAluno === raBusca;
    });
}

function encontrarBoletimPorRAOuNome(ra, nome){
    const raBusca = normalizarRA(ra);
    const nomeBusca = normalizar(nome);
    const base = pegarBaseAlunos();

    return base.find(a => {
        const bateRA = normalizarRA(a.ra) && normalizarRA(a.ra) === raBusca;
        const bateNome = normalizar(a.nome) === nomeBusca;

        return bateRA || bateNome;
    });
}

function pegarOcorrenciasAluno(nomeAluno, raAluno){
    const nomeBoletim = normalizar(nomeAluno);
    const raBoletim = normalizarRA(raAluno);

    return ocorrencias.filter(item => {
        const nomeOcorrencia = normalizar(pegarCampo(item, [
            "nome",
            "Nome do Aluno",
            "aluno"
        ]));

        const raOcorrencia = normalizarRA(pegarCampo(item, [
            "ra",
            "RA"
        ]));

        const bateRA =
            raBoletim &&
            raOcorrencia &&
            raBoletim === raOcorrencia;

        const bateNome =
            nomeBoletim &&
            nomeOcorrencia &&
            nomeBoletim === nomeOcorrencia;

        return bateRA || bateNome;
    });
}

function pegarDataOcorrencia(item){
    return pegarCampo(item, [
        "dataFato",
        "Data do Fato",
        "dataRegistro",
        "Data Registro",
        "data",
        "Data"
    ]);
}

function pegarDescricaoOcorrencia(item){
    return pegarCampo(item, [
        "descricao",
        "Descrição",
        "ocorrencia",
        "Ocorrência",
        "motivo",
        "Motivo"
    ]);
}

function pegarAjustesGeraisSala(serie){
    if(Array.isArray(villaniBank[serie])){
        return villaniBank[serie];
    }

    if(villaniBank.salas && Array.isArray(villaniBank.salas[serie])){
        return villaniBank.salas[serie];
    }

    return [];
}

function filtrarAjustesPorPeriodo(serie, periodo){
    const ajustes = pegarAjustesGeraisSala(serie);

    return ajustes.filter(item => {
        if(periodo === "anual") return true;

        if(item.bimestre === undefined || item.bimestre === null || item.bimestre === ""){
            return true;
        }

        return Number(item.bimestre) === Number(periodo);
    }).map(item => {
        const tipoNormalizado = normalizar(item.tipo);
        const valor = Math.abs(numero(item.valor));
        const valorFinal = tipoNormalizado === "deficit" ? -valor : valor;

        return {
            data: item.data || "-",
            tipo: tipoNormalizado === "deficit" ? "Déficit geral da sala" : "Superávit geral da sala",
            valorFinal,
            motivo: item.motivo || "-",
            bimestre: item.bimestre || "-"
        };
    });
}

function calcularNotasBimestre(nomeAluno, bimestre){
    const aluno = pegarAlunoBimestre(nomeAluno, bimestre);

    if(!aluno || !aluno.disciplinas){
        return {
            saldoNotas:0,
            ativos:[],
            deficit:0,
            superavit:0,
            estaveis:0,
            frequenciaAnual:NaN
        };
    }

    let saldoNotas = 0;
    let ativos = [];
    let deficit = 0;
    let superavit = 0;
    let estaveis = 0;

    Object.keys(aluno.disciplinas).forEach(disciplina => {
        const nota = numero(aluno.disciplinas[disciplina].numero);

        if(isNaN(nota)) return;

        const valor = nota * 10;
        saldoNotas += valor;

        let situacao = "Estável";

        if(nota < 5){
            situacao = "Déficit";
            deficit++;
        }else if(nota >= 7){
            situacao = "Superávit";
            superavit++;
        }else{
            estaveis++;
        }

        ativos.push({
            bimestre,
            disciplina,
            nota,
            valor,
            situacao
        });
    });

    return {
        saldoNotas,
        ativos,
        deficit,
        superavit,
        estaveis,
        frequenciaAnual: numero(aluno.totais?.frequencia_anual)
    };
}

function calcularFatorFrequencia(saldoNotas, frequencia){
    if(isNaN(frequencia)){
        return {
            valor:0,
            status:"Frequência anual não informada",
            classe:"estavel"
        };
    }

    if(frequencia < 80){
        return {
            valor: -Math.abs(saldoNotas * PERCENTUAL_FREQUENCIA),
            status:"Desvalorização por frequência abaixo de 80%",
            classe:"baixa"
        };
    }

    if(frequencia >= 90){
        return {
            valor: Math.abs(saldoNotas * PERCENTUAL_FREQUENCIA),
            status:"Valorização por frequência de 90% ou mais",
            classe:"alta"
        };
    }

    return {
        valor:0,
        status:"Frequência neutra",
        classe:"estavel"
    };
}

function calcularContaAcademica(nomeAluno, raAluno, periodo){
    const bimestres = periodo === "anual"
        ? [1,2,3,4]
        : [Number(periodo)];

    let saldoNotas = 0;
    let ativos = [];
    let deficit = 0;
    let superavit = 0;
    let estaveis = 0;
    let ultimaFrequenciaAnual = NaN;

    bimestres.forEach(bimestre => {
        const dados = calcularNotasBimestre(nomeAluno, bimestre);

        saldoNotas += dados.saldoNotas;
        ativos = ativos.concat(dados.ativos);
        deficit += dados.deficit;
        superavit += dados.superavit;
        estaveis += dados.estaveis;

        if(!isNaN(dados.frequenciaAnual)){
            ultimaFrequenciaAnual = dados.frequenciaAnual;
        }
    });

    const listaOcorrencias = pegarOcorrenciasAluno(nomeAluno, raAluno);
    const descontoOcorrencias = listaOcorrencias.length * DESCONTO_POR_OCORRENCIA;

    const ajustesGerais = filtrarAjustesPorPeriodo(serieAtual, periodo);
    const saldoAjustesGerais = ajustesGerais.reduce((total, item) => {
        return total + Number(item.valorFinal || 0);
    }, 0);

    const fatorFrequencia = calcularFatorFrequencia(saldoNotas, ultimaFrequenciaAnual);
    const saldoTotal = saldoNotas + saldoAjustesGerais - descontoOcorrencias + fatorFrequencia.valor;

    return {
        saldoNotas,
        saldoAjustesGerais,
        descontoOcorrencias,
        fatorFrequencia,
        saldoTotal,
        ativos,
        deficit,
        superavit,
        estaveis,
        ocorrencias: listaOcorrencias,
        ajustesGerais,
        frequenciaAnual: ultimaFrequenciaAnual,
        periodo
    };
}

async function entrarAluno(){
    const erro = document.getElementById("erroLogin");

    erro.style.display = "none";
    erro.innerHTML = "";
    mostrarCarregando(true);

    try{
        serieAtual = document.getElementById("loginSala").value;

        const ra = document.getElementById("loginRA").value;
        const senha = document.getElementById("loginSenha").value;

        await carregarCadastroAlunos();
        await carregarDadosSala(serieAtual);
        await carregarOcorrencias();
        await carregarVillaniBank();

        const cadastro = encontrarCadastroPorRA(ra);

        if(!cadastro){
            throw new Error("RA não encontrado no cadastro.");
        }

        const senhaCorreta = gerarSenhaAluno(cadastro);

        if(senha !== senhaCorreta){
            throw new Error("Senha incorreta. Use a primeira letra do nome maiúscula + nascimento + #.");
        }

        const nomeCadastro = pegarCampo(cadastro, ["nome", "Nome", "Nome do Aluno"]);
        const boletim = encontrarBoletimPorRAOuNome(ra, nomeCadastro);

        if(!boletim){
            throw new Error("Aluno encontrado no cadastro, mas não encontrado nos arquivos desta sala.");
        }

        alunoLogado = boletim;
        alunoCadastroLogado = cadastro;

        document.getElementById("loginTela").classList.add("oculto");
        document.getElementById("contaTela").classList.remove("oculto");

        renderizarConta();

    }catch(e){
        erro.innerHTML = escaparHTML(e.message);
        erro.style.display = "block";
    }finally{
        mostrarCarregando(false);
    }
}

function renderizarConta(){
    const periodo = document.getElementById("periodoConta").value;
    const conteudo = document.getElementById("conteudoConta");
    const dadosAluno = document.getElementById("dadosAluno");

    const ra = pegarCampo(alunoCadastroLogado, ["ra", "RA"]) || alunoLogado.ra || "-";
    const tutor = pegarCampo(alunoCadastroLogado, ["tutor", "Tutor"]) || alunoLogado.tutor || "-";
    const fotoId = pegarCampo(alunoCadastroLogado, ["foto", "Foto"]);
    const foto = montarFoto(fotoId);

    const conta = calcularContaAcademica(alunoLogado.nome, ra, periodo);

    dadosAluno.innerHTML = `
        ${foto ? `<img class="foto" src="${foto}">` : `<div class="sem-foto">?</div>`}

        <div>
            <strong style="font-size:20px;">${escaparHTML(alunoLogado.nome)}</strong><br>
            RA: ${escaparHTML(ra)}<br>
            Tutor: ${escaparHTML(tutor)}<br>
            Sala: ${escaparHTML(serieAtual.toUpperCase())}
        </div>
    `;

    let status = "Carteira acadêmica estável";

    if(conta.deficit >= 4){
        status = "Alto risco de déficit acadêmico";
    }else if(conta.superavit > conta.deficit){
        status = "Superávit acadêmico";
    }else if(conta.deficit > 0){
        status = "Atenção a ativos em baixa";
    }

    let carteiraHTML = `
    <div class="card">
        <h3>Carteira de Disciplinas</h3>

        <table>
            <tr>
                <th>Bimestre</th>
                <th>Disciplina</th>
                <th>Nota</th>
                <th>Valor</th>
                <th>Situação</th>
            </tr>
    `;

    if(conta.ativos.length === 0){
        carteiraHTML += `<tr><td colspan="5">Nenhuma nota encontrada para este período.</td></tr>`;
    }else{
        conta.ativos.forEach(item => {
            const classe = item.situacao === "Déficit"
                ? "baixa"
                : item.situacao === "Superávit"
                    ? "alta"
                    : "estavel";

            carteiraHTML += `
            <tr>
                <td>${item.bimestre}º</td>
                <td>${escaparHTML(item.disciplina)}</td>
                <td class="${classe}">${escaparHTML(item.nota)}</td>
                <td>${formatarTC(item.valor)}</td>
                <td class="${classe}">${escaparHTML(item.situacao)}</td>
            </tr>
            `;
        });
    }

    carteiraHTML += `</table></div>`;

    let ajustesHTML = `
    <div class="card">
        <h3>Movimentações Gerais da Sala</h3>

        <table>
            <tr>
                <th>Data</th>
                <th>Bimestre</th>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Motivo</th>
            </tr>
    `;

    if(conta.ajustesGerais.length === 0){
        ajustesHTML += `<tr><td colspan="5">Nenhum déficit ou superávit geral lançado para esta sala.</td></tr>`;
    }else{
        conta.ajustesGerais.forEach(item => {
            ajustesHTML += `
            <tr>
                <td>${escaparHTML(item.data)}</td>
                <td>${escaparHTML(item.bimestre)}</td>
                <td class="${item.valorFinal >= 0 ? "alta" : "baixa"}">${escaparHTML(item.tipo)}</td>
                <td class="${item.valorFinal >= 0 ? "alta" : "baixa"}">${formatarTC(item.valorFinal)}</td>
                <td>${escaparHTML(item.motivo)}</td>
            </tr>
            `;
        });
    }

    ajustesHTML += `</table></div>`;

    let ocorrenciasHTML = `
    <div class="card">
        <h3>Ocorrências Individuais</h3>

        <p>
            Quantidade encontrada:
            <strong>${conta.ocorrencias.length}</strong>.
            Cada ocorrência desconta
            <strong class="baixa">${DESCONTO_POR_OCORRENCIA} TC</strong>.
        </p>

        <table>
            <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Desconto</th>
            </tr>
    `;

    if(conta.ocorrencias.length === 0){
        ocorrenciasHTML += `<tr><td colspan="3">Nenhuma ocorrência encontrada.</td></tr>`;
    }else{
        conta.ocorrencias.forEach(item => {
            ocorrenciasHTML += `
            <tr>
                <td>${escaparHTML(formatarDataBR(pegarDataOcorrencia(item)))}</td>
                <td>${escaparHTML(pegarDescricaoOcorrencia(item) || "-")}</td>
                <td class="baixa">-${formatarTC(DESCONTO_POR_OCORRENCIA)}</td>
            </tr>
            `;
        });
    }

    ocorrenciasHTML += `</table></div>`;

    conteudo.innerHTML = `
        <div class="card saldo-card">
            <div class="saldo-label">
                Saldo acadêmico disponível
                <button class="btn-info" onclick="abrirInfo('saldo')">i</button>
            </div>
            <div class="saldo-valor">${formatarTC(conta.saldoTotal)}</div>
            <div class="saldo-status">${escaparHTML(status)}</div>
        </div>

        <div class="grid">
            <div class="indicador">
                <div class="indicador-topo">
                    Saldo das notas
                    <button class="btn-info" onclick="abrirInfo('tc')">i</button>
                </div>
                <strong>${formatarTC(conta.saldoNotas)}</strong>
            </div>

            <div class="indicador">
                <div class="indicador-topo">
                    Ajuste geral da sala
                    <button class="btn-info" onclick="abrirInfo('superavit')">i</button>
                </div>
                <strong class="${conta.saldoAjustesGerais >= 0 ? "alta" : "baixa"}">
                    ${formatarTC(conta.saldoAjustesGerais)}
                </strong>
            </div>

            <div class="indicador">
                <div class="indicador-topo">
                    Ocorrências
                    <button class="btn-info" onclick="abrirInfo('ocorrencias')">i</button>
                </div>
                <strong class="baixa">-${formatarTC(conta.descontoOcorrencias)}</strong>
            </div>
        </div>

        <div class="grid">
            <div class="indicador">
                <div class="indicador-topo">
                    Frequência anual
                    <button class="btn-info" onclick="abrirInfo('frequencia')">i</button>
                </div>
                <strong class="${conta.fatorFrequencia.classe}">
                    ${isNaN(conta.frequenciaAnual) ? "-" : conta.frequenciaAnual + "%"}
                </strong>
            </div>

            <div class="indicador">
                <div class="indicador-topo">
                    Valorização/Desvalorização
                    <button class="btn-info" onclick="abrirInfo('frequencia')">i</button>
                </div>
                <strong class="${conta.fatorFrequencia.classe}">
                    ${formatarTC(conta.fatorFrequencia.valor)}
                </strong>
                <div class="muted">${escaparHTML(conta.fatorFrequencia.status)}</div>
            </div>

            <div class="indicador">
                <div class="indicador-topo">
                    Período
                    <button class="btn-info" onclick="abrirInfo('tc')">i</button>
                </div>
                <strong>${periodo === "anual" ? "Anual" : periodo + "º"}</strong>
            </div>
        </div>

        <div class="grid">
            <div class="indicador">
                <div class="indicador-topo">
                    Ativos em superávit
                    <button class="btn-info" onclick="abrirInfo('superavit')">i</button>
                </div>
                <strong class="alta">${conta.superavit}</strong>
            </div>

            <div class="indicador">
                Ativos estáveis
                <strong class="estavel">${conta.estaveis}</strong>
            </div>

            <div class="indicador">
                <div class="indicador-topo">
                    Ativos em déficit
                    <button class="btn-info" onclick="abrirInfo('deficit')">i</button>
                </div>
                <strong class="baixa">${conta.deficit}</strong>
            </div>
        </div>

        ${carteiraHTML}
        ${ajustesHTML}
        ${ocorrenciasHTML}
    `;
}

function sair(){
    alunoLogado = null;
    alunoCadastroLogado = null;

    document.getElementById("contaTela").classList.add("oculto");
    document.getElementById("loginTela").classList.remove("oculto");
    document.getElementById("loginSenha").value = "";
}
