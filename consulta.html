<!DOCTYPE html> 
<html lang="pt-br"> 
<head> 
<meta charset="UTF-8"> 
<title>Consulta de Alunos</title> 
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"> 
<style> 
* { 
margin: 0; 
padding: 0; 
box-sizing: border-box; 
font-family: 'Inter', sans-serif; 
} 

body { 
background: linear-gradient(135deg, #eef2ff, #f8fafc); 
padding: 30px; 
color: #1f2937; 
} 

.container { 
max-width: 1000px; 
margin: auto; 
} 

h2 { 
text-align: center; 
margin-bottom: 20px; 
font-weight: 600; 
} 

.search-box { 
display: flex; 
gap: 10px; 
margin-bottom: 20px; 
} 

input { 
flex: 1; 
padding: 10px 12px; 
border-radius: 10px; 
border: 1px solid #e5e7eb; 
transition: 0.2s; 
} 

input:focus { 
outline: none; 
border-color: #6366f1; 
box-shadow: 0 0 0 2px rgba(99,102,241,0.15); 
} 

button { 
padding: 10px 16px; 
border-radius: 10px; 
border: none; 
cursor: pointer; 
font-weight: 500; 
transition: 0.2s; 
} 

button:hover { 
transform: translateY(-1px); 
} 

.search-btn { 
background: #6366f1; 
color: white; 
} 

.search-btn:hover { 
background: #4f46e5; 
} 

.aluno { 
background: white; 
padding: 15px; 
margin-bottom: 12px; 
border-radius: 14px; 
display: flex; 
gap: 15px; 
align-items: center; 
box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
transition: 0.2s; 
} 

.aluno:hover { 
transform: translateY(-2px); 
} 

.foto { 
width: 65px; 
height: 65px; 
border-radius: 50%; 
object-fit: cover; 
cursor: pointer; 
border: 2px solid #e5e7eb; 
} 

.sem-foto { 
width: 65px; 
height: 65px; 
border-radius: 50%; 
background: #f3f4f6; 
display: flex; 
align-items: center; 
justify-content: center; 
font-size: 22px; 
color: #ef4444; 
font-weight: bold; 
} 

.aluno strong { 
font-size: 15px; 
} 

.aluno div { 
font-size: 13px; 
line-height: 1.4; 
} 

.paginacao { 
text-align: center; 
margin-top: 20px; 
} 

.paginacao button { 
background: #f3f4f6; 
} 

.paginacao button:hover { 
background: #e5e7eb; 
} 

#pagina { 
margin: 0 10px; 
font-weight: 500; 
} 

/* POPUP */ 
.popup { 
display: none; 
position: fixed; 
z-index: 999; 
top: 0; 
left: 0; 
width: 100%; 
height: 100%; 
background: rgba(0,0,0,0.9); 
justify-content: center; 
align-items: center; 
} 

.popup img { 
max-width: 90vw; 
max-height: 90vh; 
object-fit: contain; 
border-radius: 12px; 
} 

.fechar { 
position: absolute; 
top: 20px; 
right: 30px; 
color: white; 
font-size: 30px; 
font-weight: bold; 
cursor: pointer; 
opacity: 0.7; 
} 

.fechar:hover { 
opacity: 1; 
} 

@media (max-width: 600px) { 
.search-box { 
flex-direction: column; 
} 

.aluno { 
flex-direction: column; 
align-items: flex-start; 
} 
} 
</style> 
</head> 
<body> 

<div class="container"> 
<h2>🔍 Consulta de Alunos</h2> 

<div class="search-box"> 
<input type="text" id="busca" placeholder="Pesquisar qualquer campo"> 
<button class="search-btn" onclick="buscar()">Buscar</button> 
</div> 

<div id="resultado"></div> 

<div class="paginacao"> 
<button onclick="anterior()">⬅</button> 
<span id="pagina"></span> 
<button onclick="proximo()">➡</button> 
</div> 
</div> 

<!-- POPUP --> 
<div id="popup" class="popup" onclick="fecharPopup(event)"> 
<span class="fechar" onclick="fecharPopup(event)">×</span> 
<img id="imgPopup"> 
</div> 

<script> 
const url = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqCwWkJDRHbKhkcR7sTyWX6VqWZ-5m577AB1ictRYVg/exec"; 
let dados = []; 
let filtrados = []; 
let paginaAtual = 1; 
const porPagina = 5; 

function montarFoto(id) { 
if (!id) return null; 
id = String(id).trim(); 
if (id.length < 10) return null; 
return "https://lh3.googleusercontent.com/d/" + id; 
} 

function formatarData(dataStr) { 
if (!dataStr) return '-'; 
const d = new Date(dataStr); 
if (isNaN(d)) return dataStr; 
const dia = String(d.getDate()).padStart(2, '0'); 
const mes = String(d.getMonth() + 1).padStart(2, '0'); 
const ano = d.getFullYear(); 
return ${dia}/${mes}/${ano}; 
} 

function carregar() { 
fetch(url) 
.then(r => r.json()) 
.then(data => { 
dados = data; 
filtrados = data; 
renderizar(); 
}); 
} 

function buscar() { 
const valor = document.getElementById("busca").value.toLowerCase().trim(); 
if (!valor) { 
filtrados = dados; 
} else { 
filtrados = dados.filter(a => { 
return Object.keys(a).some(k => { 
return String(a[k] || "").toLowerCase().includes(valor); 
}); 
}); 
} 
paginaAtual = 1; 
renderizar(); 
} 

function renderizar() { 
const inicio = (paginaAtual - 1) * porPagina; 
const paginaDados = filtrados.slice(inicio, inicio + porPagina); 
const div = document.getElementById("resultado"); 
div.innerHTML = ""; 

if (paginaDados.length === 0) { 
div.innerHTML = "❌ Nenhum resultado encontrado"; 
return; 
} 

paginaDados.forEach(a => { 
const foto = montarFoto(a.foto); 
const fotoHTML = foto ? <img class="foto" src="${foto}" onclick="abrirPopup('${foto}')"> : <div class="sem-foto">❌</div>; 

div.innerHTML += <div class="aluno"> 
${fotoHTML} 
<div> 
<strong>${a.nome}</strong><br> 
RA: ${a.ra}<br> 
Data: ${formatarData(a.data)}<br> 
Nascimento: ${formatarData(a.nascimento)}<br> 
Sala: ${a.sala}<br> 
Tutor: ${a.tutor}<br> 
Eletiva1: ${a.eletiva1 || '-'}<br> 
Eletiva2: ${a.eletiva2 || '-'} 
</div> 
</div>; 
}); 

document.getElementById("pagina").innerText = "Página " + paginaAtual + " de " + Math.ceil(filtrados.length / porPagina); 
} 

function proximo() { 
if (paginaAtual < Math.ceil(filtrados.length / porPagina)) { 
paginaAtual++; 
renderizar(); 
} 
} 

function anterior() { 
if (paginaAtual > 1) { 
paginaAtual--; 
renderizar(); 
} 
} 

function abrirPopup(src) { 
document.getElementById("popup").style.display = "flex"; 
document.getElementById("imgPopup").src = src; 
} 

function fecharPopup(e) { 
if (e.target.tagName === "IMG") return; 
document.getElementById("popup").style.display = "none"; 
} 

carregar(); 
</script> 

</body> 
</html>
