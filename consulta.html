<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boletim Escolar 1</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    padding: 10px;
}

.container {
    max-width: 1200px;
    margin: auto;
}

select {
    padding: 10px;
    margin-bottom: 15px;
    width: 100%;
    font-size: 16px;
}

.aluno {
    background: white;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 15px;
    display: flex;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    align-items: flex-start;
}

.aluno img {
    width: 85px;
    height: 85px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid #ddd;
    cursor: pointer;
}

.sem-foto {
    width: 85px;
    height: 85px;
    border-radius: 10px;
    background: #f1f1f1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    color: #999;
}

.info {
    flex: 1;
    font-size: 14px;
}

/* tabela responsiva */
.table-wrapper {
    overflow-x: auto;
    margin-top: 8px;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 600px;
}

th, td {
    border: 1px solid #ddd;
    padding: 6px;
    text-align: center;
    font-size: 13px;
}

th {
    background: #0077cc;
    color: white;
}

/* mobile */
@media (max-width: 768px) {
    .aluno {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    table {
        min-width: 500px;
    }
}

/* POPUP FOTO */
.popup {
    display: none;
    position: fixed;
    z-index: 999;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
}

.popup img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 10px;
}

.fechar {
    position: absolute;
    top: 20px;
    right: 25px;
    font-size: 30px;
    color: white;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">
    <h2>Boletim Escolar</h2>

    <select id="salaSelect" onchange="carregarDados()">
        <option value="6a">6º A</option>
        <option value="6b">6º B</option>
        <option value="6c">6º C</option>
        <option value="7a">7º A</option>
        <option value="7b">7º B</option>
    </select>

    <div id="boletim"></div>
</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="fecharPopup(event)">
    <span class="fechar">×</span>
    <img id="imgPopup">
</div>

<script>

const URL_ALUNOS = "https://script.google.com/macros/s/AKfycbzMz2KkT2rF4pFG5skyztvtHHVms1LMXfGjLMWj2chY-zYbPPqN3PpHLknqE7Rj651Cjw/exec";

const SALAS = {
    "6a": "6apb.json",
    "6b": "6bpb.json",
    "6c": "6cpb.json",
    "7a": "7apb.json",
    "7b": "7bpb.json"
};

// 🔥 normalizador
function normalizar(texto) {
    return (texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

/* =========================
   📸 FOTO (NOVA ESTRATÉGIA)
========================= */
function montarFoto(id) {
    if (!id) return null;

    id = String(id).trim();

    if (id.length < 10) return null;

    return "https://lh3.googleusercontent.com/d/" + id;
}

function erroFoto(nome, url) {
    console.error("❌ ERRO FOTO");
    console.error("Aluno:", nome);
    console.error("ID recebido:", url);
}

/* ========================= */

async function carregarDados() {
    const sala = document.getElementById("salaSelect").value;

    try {
        const resAlunos = await fetch(URL_ALUNOS);
        const alunos = await resAlunos.json();

        const resNotas = await fetch(SALAS[sala]);
        const notas = await resNotas.json();

        montarBoletim(alunos, notas, sala);

    } catch (e) {
        console.error("Erro geral:", e);
    }
}

function montarBoletim(alunos, notas, salaSelecionada) {
    const container = document.getElementById("boletim");
    container.innerHTML = "";

    const notasPorNome = {};

    for (let key in notas) {
        const a = notas[key];
        if (!a?.nome) continue;

        notasPorNome[normalizar(a.nome)] = a;
    }

    const alunosSala = alunos.filter(a =>
        normalizar(a.sala) === normalizar(salaSelecionada)
    );

    alunosSala.forEach(aluno => {

        const dados = notasPorNome[normalizar(aluno.nome)];
        if (!dados) return;

        const fotoFinal = montarFoto(aluno.foto);

        if (!fotoFinal) {
            erroFoto(aluno.nome, aluno.foto);
        }

        const fotoHTML = fotoFinal
            ? `<img src="${fotoFinal}" onclick="abrirPopup('${fotoFinal}')">`
            : `<div class="sem-foto">❌</div>`;

        const div = document.createElement("div");
        div.className = "aluno";

        div.innerHTML = `
            ${fotoHTML}

            <div class="info">
                <strong>${aluno.nome}</strong><br>
                RA: ${aluno.ra || '-'}<br>
                Tutor: ${aluno.tutor || '-'}

                <div class="table-wrapper">
                    ${gerarTabela(dados.disciplinas)}
                </div>
            </div>
        `;

        container.appendChild(div);
    });
}

function gerarTabela(disciplinas) {
    if (!disciplinas) return "<p style='color:red'>Sem disciplinas</p>";

    let html = `
    <table>
        <tr>
            <th>Disciplina</th>
            <th>Chamada</th>
            <th>Média</th>
            <th>Faltas</th>
            <th>Acumulado</th>
        </tr>
    `;

    for (let nome in disciplinas) {
        const d = disciplinas[nome];

        html += `
        <tr>
            <td>${nome.replaceAll("_", " ")}</td>
            <td>${d.numero ?? "-"}</td>
            <td>${d.media ?? "-"}</td>
            <td>${d.faltas ?? "-"}</td>
            <td>${d.acumulado ?? "-"}</td>
        </tr>
        `;
    }

    html += "</table>";
    return html;
}

/* =========================
   POPUP FOTO
========================= */
function abrirPopup(src) {
    document.getElementById("popup").style.display = "flex";
    document.getElementById("imgPopup").src = src;
}

function fecharPopup(e) {
    if (e.target.tagName === "IMG") return;
    document.getElementById("popup").style.display = "none";
}

carregarDados();

</script>

</body>
</html>
