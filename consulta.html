<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Alunos 2</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: linear-gradient(135deg, #eef2ff, #f8fafc);
  padding: 30px;
  color: #1f2937;
}

.container {
  max-width: 1000px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 20px;
  font-weight: 600;
}

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
}

input:focus {
  outline: none;
  border-color: #6366f1;
}

button {
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 500;
}

.search-btn {
  background: #6366f1;
  color: white;
}

.aluno {
  background: white;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 14px;
  display: flex;
  gap: 15px;
  align-items: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

.foto {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid #e5e7eb;
}

.sem-foto {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.paginacao {
  text-align: center;
  margin-top: 20px;
}

#pagina {
  margin: 0 10px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔍 Consulta de Alunos</h2>

<div class="search-box">
  <input type="text" id="busca" placeholder="Pesquisar nome, RA ou sala (ex: 8C)">
  <button class="search-btn" onclick="buscar()">Buscar</button>
</div>

<div id="resultado"></div>

<div class="paginacao">
  <button onclick="anterior()">⬅</button>
  <span id="pagina"></span>
  <button onclick="proximo()">➡</button>
</div>

</div>

<!-- POPUP -->
<div id="popup" class="popup" onclick="fecharPopup(event)">
  <span class="fechar">×</span>
  <img id="imgPopup">
</div>

<script>

const url = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqCwWkJDRHbKhkcR7sTyWX6VqWZ-5m577AB1ictRYVg/exec";

let dados = [];
let filtrados = [];
let paginaAtual = 1;
const porPagina = 5;

function montarFoto(id) {
  if (!id) return null;
  return "https://lh3.googleusercontent.com/d/" + id;
}

function formatarData(dataStr) {
  if (!dataStr) return '-';
  const d = new Date(dataStr);
  if (isNaN(d)) return dataStr;

  const dia = String(d.getDate()).padStart(2, '0');
  const mes = String(d.getMonth() + 1).padStart(2, '0');
  const ano = d.getFullYear();

  return `${dia}/${mes}/${ano}`;
}

function carregar() {
  fetch(url)
    .then(r => r.json())
    .then(data => {
      dados = data;
      filtrados = data;
      renderizar();
    });
}

function buscar() {
  const valor = document.getElementById("busca").value.toLowerCase().trim();

  if (!valor) {
    filtrados = dados;
  } else {
    filtrados = dados.filter(a => {

      const sala = String(a.sala || "").toLowerCase();
      const nome = String(a.nome || "").toLowerCase();
      const ra = String(a.ra || "").toLowerCase();

      // 🔥 busca específica por sala (ex: 8c)
      return (
        nome.includes(valor) ||
        ra.includes(valor) ||
        sala.includes(valor)
      );
    });
  }

  paginaAtual = 1;
  renderizar();
}

function renderizar() {

  const inicio = (paginaAtual - 1) * porPagina;
  const paginaDados = filtrados.slice(inicio, inicio + porPagina);

  const div = document.getElementById("resultado");
  div.innerHTML = "";

  if (paginaDados.length === 0) {
    div.innerHTML = "❌ Nenhum resultado encontrado";
    return;
  }

  paginaDados.forEach(a => {

    const foto = montarFoto(a.foto);

    const fotoHTML = foto
      ? `<img class="foto" src="${foto}" onclick="abrirPopup('${foto}')">`
      : `<div class="sem-foto">❌</div>`;

    div.innerHTML += `
      <div class="aluno">
        ${fotoHTML}
        <div>
          <strong>${a.nome}</strong><br>
          RA: ${a.ra}<br>
          Data: ${formatarData(a.data)}<br>
          Nascimento: ${formatarData(a.nascimento)}<br>
          Sala: ${a.sala}<br>
          Tutor: ${a.tutor}<br>
          Eletiva1: ${a.eletiva1 || '-'}<br>
          Eletiva2: ${a.eletiva2 || '-'}
        </div>
      </div>
    `;
  });

  document.getElementById("pagina").innerText =
    `Página ${paginaAtual} de ${Math.ceil(filtrados.length / porPagina)}`;
}

function proximo() {
  if (paginaAtual < Math.ceil(filtrados.length / porPagina)) {
    paginaAtual++;
    renderizar();
  }
}

function anterior() {
  if (paginaAtual > 1) {
    paginaAtual--;
    renderizar();
  }
}

function abrirPopup(src) {
  document.getElementById("popup").style.display = "flex";
  document.getElementById("imgPopup").src = src;
}

function fecharPopup(e) {
  document.getElementById("popup").style.display = "none";
}

// 🔥 busca com ENTER
document.addEventListener("keydown", function(e){
  if(e.key === "Enter") buscar();
});

carregar();

</script>

</body>
</html>
