<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro de Ocorrências 40</title>

<style>
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #eef2f7, #e4ebf5);
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 520px;
    margin: auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.08);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
  }

  label {
    font-size: 14px;
    margin-top: 12px;
    display: block;
    color: #555;
  }

  input, select, textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #dcdcdc;
    font-size: 14px;
  }

  button {
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }

  button:disabled {
    background: #999;
    cursor: not-allowed;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Registro de Ocorrências</h2>

  <label>Selecione a Sala</label>
  <select id="salaSelect">
    <option value="">Carregando salas...</option>
  </select>

  <label>Selecione o Aluno</label>
  <select id="alunoSelect">
    <option value="">Escolha um aluno</option>
  </select>

  <label>Tutor do Aluno</label>
  <input type="text" id="tutor" readonly>

  <label>RA do Aluno</label>
  <input type="text" id="ra" readonly>

  <label>Data do Fato</label>
  <input type="date" id="dataFato">

  <label>Hora do Fato</label>
  <input type="time" id="horaFato">

  <label>Nome do Professor</label>
  <input type="text" id="professor">

  <label>Descrição da Ocorrência</label>
  <textarea id="descricao" rows="4"></textarea>

  <label>Ação Tomada</label>
  <textarea id="acao" rows="2"></textarea>

  <button id="btnEnviar" onclick="enviar()">Enviar Ocorrência</button>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxumXT10my5xZQL0_BeeC3NRtDCFSK1-dWYMk3qLQEuPDqDkAoGvLZjvZ4S7t6r9trj/exec";
const ALUNOS_URL = "https://script.google.com/macros/s/AKfycbxxbE3LiV3p2hPIegaqyqadlOzUqCwWkJDRHbKhkcR7sTyWX6VqWZ-5m577AB1ictRYVg/exec";

const CACHE_KEY = "alunos_cache";
const CACHE_TIME = 10 * 60 * 1000;

let alunosExternos = [];
let enviando = false;

const salaSelect = document.getElementById("salaSelect");
const alunoSelect = document.getElementById("alunoSelect");
const botao = document.getElementById("btnEnviar");

function corrigirTexto(msg) {
  return msg
    .replace(/OCORRENCIA/g, "OCORRÊNCIA")
    .replace(/Ocorrencia/g, "Ocorrência")
    .replace(/Descricao/g, "Descrição")
    .replace(/Acao/g, "Ação");
}

function carregarAlunos() {
  const cache = localStorage.getItem(CACHE_KEY);
  const cacheTime = Number(localStorage.getItem(CACHE_KEY + "_time"));

  if (cache && cacheTime && Date.now() - cacheTime < CACHE_TIME) {
    try {
      alunosExternos = JSON.parse(cache);
      montarSalas();
      return;
    } catch (e) {
      localStorage.removeItem(CACHE_KEY);
      localStorage.removeItem(CACHE_KEY + "_time");
    }
  }

  fetch(ALUNOS_URL)
    .then(res => {
      if (!res.ok) {
        throw new Error("Erro ao buscar alunos");
      }
      return res.json();
    })
    .then(data => {
      alunosExternos = Array.isArray(data) ? data : [];

      localStorage.setItem(CACHE_KEY, JSON.stringify(alunosExternos));
      localStorage.setItem(CACHE_KEY + "_time", Date.now().toString());

      montarSalas();
    })
    .catch(err => {
      console.error(err);
      salaSelect.innerHTML = '<option value="">Erro ao carregar salas</option>';
      alunoSelect.innerHTML = '<option value="">Escolha um aluno</option>';
    });
}

function montarSalas() {
  const salas = [...new Set(
    alunosExternos
      .map(a => a.sala)
      .filter(Boolean)
  )].sort();

  salaSelect.innerHTML = '<option value="">Escolha uma sala</option>';

  if (salas.length === 0) {
    salaSelect.innerHTML = '<option value="">Nenhuma sala encontrada</option>';
    return;
  }

  salas.forEach(sala => {
    const opt = document.createElement("option");
    opt.value = sala;
    opt.textContent = sala;
    salaSelect.appendChild(opt);
  });
}

salaSelect.addEventListener("change", function() {
  const selectedSala = this.value;

  alunoSelect.innerHTML = '<option value="">Escolha um aluno</option>';

  alunosExternos
    .filter(a => a.sala === selectedSala)
    .sort((a, b) => String(a.nome || "").localeCompare(String(b.nome || "")))
    .forEach(aluno => {
      const opt = document.createElement("option");
      opt.value = aluno.ra || "";
      opt.textContent = aluno.nome || "Aluno sem nome";
      opt.dataset.tutor = aluno.tutor || "";
      opt.dataset.nome = aluno.nome || "";
      alunoSelect.appendChild(opt);
    });

  document.getElementById("tutor").value = "";
  document.getElementById("ra").value = "";
});

alunoSelect.addEventListener("change", function() {
  const selected = this.options[this.selectedIndex];

  document.getElementById("tutor").value = selected.dataset.tutor || "";
  document.getElementById("ra").value = selected.value || "";
});

function enviar() {
  if (enviando) return;

  const sala = salaSelect.value;
  const ra = document.getElementById("ra").value;
  const tutor = document.getElementById("tutor").value;
  const nome = alunoSelect.selectedOptions[0]?.dataset.nome || "";
  const professor = document.getElementById("professor").value.trim();
  const descricao = document.getElementById("descricao").value.trim();
  const acao = document.getElementById("acao").value.trim();
  const dataFato = document.getElementById("dataFato").value;
  const horaFato = document.getElementById("horaFato").value;

  if (!sala || !ra || !nome || !professor || !descricao || !dataFato || !horaFato) {
    alert("Preencha todos os campos obrigatórios!");
    return;
  }

  enviando = true;
  botao.disabled = true;
  botao.innerText = "Enviando...";

  const [ano, mes, dia] = dataFato.split("-");
  const dataFormatada = `${dia}/${mes}/${ano}`;

  const formData = new URLSearchParams({
    sala,
    ra,
    nome,
    tutor,
    professor,
    descricao,
    acao,
    dataFato: dataFormatada,
    horaFato
  });

  fetch(`${WEBAPP_URL}?action=registrar&${formData.toString()}`)
    .then(res => {
      if (!res.ok) {
        throw new Error("Erro na comunicação com o servidor");
      }
      return res.json();
    })
    .then(data => {
      if (data.status === "duplicado") {
        alert("Essa ocorrência já foi registrada anteriormente.");
        return;
      }

      if (data.status !== "ok") {
        throw new Error(data.message || "Erro no servidor");
      }

      if (!data.whatsapp) {
        throw new Error("Link do WhatsApp não foi retornado pelo servidor");
      }

      abrirWhatsApp(data.whatsapp);
    })
    .catch(err => {
      alert("Erro ao enviar: " + err.message);
    })
    .finally(() => {
      enviando = false;
      botao.disabled = false;
      botao.innerText = "Enviar Ocorrência";
    });
}

function abrirWhatsApp(link) {
  const match = link.match(/wa\.me\/(\d+)\?text=([^&]+)/);

  if (!match) {
    window.location.href = link;
    return;
  }

  const phone = match[1];
  let text = decodeURIComponent(match[2]);

  text = corrigirTexto(text);

  const whatsappUrl = `https://wa.me/${phone}?text=${encodeURIComponent(text)}`;

  window.location.href = whatsappUrl;
}

carregarAlunos();
</script>

</body>
</html>
